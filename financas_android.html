<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Finanças Pessoais</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root{--bg:#0F1117;--bg2:#181C27;--bg3:#1E2235;--bg4:#252B40;--border:#2A3050;--border2:#353D60;--text:#E8EAF0;--text2:#9BA3BF;--text3:#5C6480;--green:#2DD4A0;--green2:#1A8C6A;--green3:#0D4A38;--red:#F05252;--red2:#A83535;--red3:#3A1515;--blue:#5B8AF0;--blue2:#3A5FB8;--blue3:#1A2550;--orange:#F09A40;--orange2:#A86820;--orange3:#3A2010;--purple:#A075F0;--purple2:#6845B0;--purple3:#2A1850;--gold:#F0C840;--radius:12px;--radius-sm:8px;--radius-xs:5px;--font:'Inter',system-ui,sans-serif;--shadow:0 4px 24px rgba(0,0,0,.4);}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.app{display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0;display:flex;flex-direction:column;position:-webkit-sticky;position:sticky;top:0;z-index:100}.topbar-row1{display:flex;align-items:center;gap:8px;padding:0 12px;height:48px}.topbar-row2{display:flex;overflow-x:auto;border-top:1px solid var(--border);-webkit-overflow-scrolling:touch;scrollbar-width:none;min-height:38px}.topbar-row2::-webkit-scrollbar{display:none}
.topbar-logo{font-size:15px;font-weight:700;color:var(--green)}
.year-select{display:flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:4px 10px}
.year-select select{background:none;border:none;color:var(--text);font-size:13px;font-weight:600;outline:none;cursor:pointer}
.year-add-btn{background:none;border:1px solid var(--border);border-radius:var(--radius-xs);color:var(--text2);font-size:11px;padding:3px 8px;cursor:pointer}
.year-add-btn:hover{background:var(--bg3);color:var(--text)}
.nav{display:flex;gap:2px}
.nbtn{background:none;border:none;border-bottom:2px solid transparent;color:var(--text2);font-size:12px;font-weight:500;padding:6px 14px;cursor:pointer;transition:.15s;white-space:nowrap;font-family:var(--font)}
.nbtn:hover{background:var(--bg3);color:var(--text)}
.nbtn.on{background:var(--bg3);color:var(--green);border-bottom-color:var(--green)}
.main{flex:1;padding:16px;max-width:1200px;width:100%;margin:0 auto;padding-bottom:calc(20px + env(safe-area-inset-bottom))}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.ctit{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text2);margin-bottom:12px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.met{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px}
.mlbl{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.mval{font-size:16px;font-weight:700;line-height:1}
.msub{font-size:11px;color:var(--text2);margin-top:4px}
.g .mval{color:var(--green)}.r .mval{color:var(--red)}.b .mval{color:var(--blue)}.o .mval{color:var(--orange)}.p .mval{color:var(--purple)}.gd .mval{color:var(--gold)}
.btn{display:inline-flex;align-items:center;gap:6px;border:none;border-radius:var(--radius-sm);padding:8px 16px;font-size:13px;font-weight:500;cursor:pointer;transition:.15s;font-family:var(--font)}
.bsm{padding:5px 12px;font-size:12px}.bxs{padding:3px 8px;font-size:11px}
.bg{background:var(--green);color:#000}.bg:hover{opacity:.85}
.br{background:var(--red);color:#fff}.br:hover{opacity:.85}
.bb{background:var(--blue);color:#fff}.bb:hover{opacity:.85}
.bo{background:var(--orange);color:#000}.bo:hover{opacity:.85}
.bp{background:var(--purple);color:#fff}.bp:hover{opacity:.85}
.bgh{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}.bgh:hover{color:var(--text);background:var(--bg4)}
.tag{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;white-space:nowrap}
.tda{background:var(--blue3);color:var(--blue);border:1px solid var(--blue2)}
.tfr{background:var(--purple3);color:var(--purple);border:1px solid var(--purple2)}
.tfi{background:var(--green3);color:var(--green);border:1px solid var(--green2)}
.tpa{background:var(--orange3);color:var(--orange);border:1px solid var(--orange2)}
.tnu{background:#1A1035;color:#9B59FC;border:1px solid #5B35B8}
.tmp{background:#0A2518;color:#2DD4A0;border:1px solid #1A6A48}
.tit{background:#1A1210;color:#F09A40;border:1px solid #A86820}
.tou{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.inp{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 12px;color:var(--text);font-size:13px;font-family:var(--font);outline:none;transition:.15s}
.inp:focus{border-color:var(--blue);background:var(--bg4)}
.inp::placeholder{color:var(--text3)}
.isml{padding:6px 10px;font-size:12px}
select.inp{cursor:pointer}
.fr{display:grid;gap:10px;margin-bottom:10px}
.c2{grid-template-columns:1fr 1fr}.c3{grid-template-columns:1fr 1fr 1fr}.c4{grid-template-columns:1fr 1fr 1fr 1fr}
.fl{font-size:11px;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{text-align:left;padding:8px 10px;color:var(--text2);font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--border);white-space:nowrap}
.tbl td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:middle;color:var(--text)}
.tbl tr:last-child td{border-bottom:none}.tbl tr:hover td{background:var(--bg3)}
.tbl td.rv{text-align:right}.tbl td.cv{text-align:center}
.mtab{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-xs);padding:4px 10px;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;transition:.15s;border:none;font-family:var(--font)}
.mtab.on{background:var(--green3);border:1px solid var(--green2);color:var(--green)}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:24px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow)}
.mtitle{font-size:16px;font-weight:700;color:var(--text);margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.mclose{background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;padding:0 4px}
.pw{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-top:6px}
.pb{height:6px;border-radius:3px}
.ins{background:var(--bg3);border-left:3px solid var(--blue);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:10px 14px;margin-bottom:8px;font-size:12px;line-height:1.6}
.ins.good{border-color:var(--green)}.ins.warn{border-color:var(--orange)}.ins.bad{border-color:var(--red)}
.qa{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.qab{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px 12px;text-align:center;cursor:pointer;transition:.15s;display:flex;flex-direction:column;align-items:center;gap:8px}
.qab:hover{border-color:var(--border2);background:var(--bg4)}
.qi{font-size:22px}.ql{font-size:11px;font-weight:500;color:var(--text2)}
.er{display:flex;align-items:center;gap:8px;padding:6px 12px;border-bottom:1px solid var(--border)}
.er:last-child{border-bottom:none}.er:hover{background:var(--bg3)}
.ed{background:none;border:none;color:var(--text2);font-size:13px;font-family:var(--font);outline:none;padding:2px 4px;border-radius:4px;flex:1;min-width:0}
.ed:hover,.ed:focus{background:var(--bg4);color:var(--text)}
.ev{width:100px;background:none;border:none;font-size:13px;font-weight:600;text-align:right;font-family:var(--font);outline:none;padding:2px 6px;border-radius:4px}
.ev:hover,.ev:focus{background:var(--bg4)}
.ev.gv{color:var(--green)}.ev.rv{color:var(--red)}
.del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;padding:2px 4px;opacity:.4;transition:.15s;font-family:var(--font)}
.del:hover{opacity:1;color:var(--red)}
.av{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:8px;display:flex;align-items:flex-start;gap:10px}
.rdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.tgr{display:flex;gap:4px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:3px}
.tgo{flex:1;text-align:center;padding:5px 10px;border-radius:5px;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;transition:.15s;user-select:none}
.tgo.on{background:var(--bg4);color:var(--text)}
.chk-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg3);margin-bottom:6px;transition:.15s}
.chk-row.done{opacity:.55;background:var(--bg2)}
.chk-row.done .chk-label{text-decoration:line-through;color:var(--text3)}
.chk-box{width:18px;height:18px;border-radius:4px;border:2px solid var(--border2);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.15s;background:var(--bg4)}
.chk-box.checked{background:var(--green);border-color:var(--green2)}
.chk-box.checked-r{background:var(--red);border-color:var(--red2)}
.chk-label{flex:1;font-size:13px;font-weight:500}
.chk-val{font-size:13px;font-weight:700}
.chk-val.g{color:var(--green)}.chk-val.r{color:var(--red)}
.ann-cell{background:none;border:none;color:inherit;font-family:var(--font);font-size:11px;text-align:right;width:60px;padding:2px 4px;border-radius:3px;outline:none;cursor:pointer}
.ann-cell:hover,.ann-cell:focus{background:var(--bg4);color:var(--text)!important;border:1px solid var(--blue)}
@media(max-width:768px){.g4,.qa{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:1fr 1fr}.c3,.c4{grid-template-columns:1fr 1fr}}
@media(max-width:480px){.g2,.g3,.g4,.qa{grid-template-columns:1fr}.c2,.c3,.c4{grid-template-columns:1fr}}

button,a{-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
input,select,textarea{-webkit-tap-highlight-color:transparent;font-size:16px!important;}
.nbtn{min-height:40px;-webkit-tap-highlight-color:transparent;}
.btn{min-height:36px;-webkit-tap-highlight-color:transparent;}
.del{min-width:36px;min-height:36px;padding:6px 10px!important;}
.mtab{min-height:34px;-webkit-tap-highlight-color:transparent;}

#drive-banner{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;display:flex;align-items:center;gap:10px;z-index:500;box-shadow:var(--shadow);min-width:280px;max-width:90vw}

.sec-hdr{display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;margin-bottom:0}
.sec-hdr:hover .sec-tog{color:var(--text)}
.sec-tog{background:none;border:1px solid var(--border);border-radius:4px;color:var(--text2);width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;flex-shrink:0;line-height:1}
.sec-body{overflow:hidden;transition:max-height .25s ease}
.sec-body.collapsed{max-height:0!important}

.ann-cur-col{background:rgba(91,138,240,.08);position:relative;}
.ann-cur-col::after{content:'';position:absolute;top:0;left:0;right:0;bottom:0;border-left:1px solid rgba(91,138,240,.3);border-right:1px solid rgba(91,138,240,.3);pointer-events:none;}
th.ann-cur-col{background:rgba(91,138,240,.15)!important;color:var(--blue)!important;border-left:1px solid rgba(91,138,240,.4);border-right:1px solid rgba(91,138,240,.4);}
th.ann-cur-col::after{display:none;}

.atrs-row{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--radius-xs);background:var(--red3);border:1px solid var(--red2);margin-bottom:5px}
.atrs-row:last-child{margin-bottom:0}
.atrs-ico{font-size:13px;flex-shrink:0}
.atrs-nome{flex:1;font-size:12px;font-weight:500;color:var(--text)}
.atrs-mes{font-size:10px;color:var(--red);background:rgba(240,82,82,.15);border-radius:3px;padding:1px 5px;white-space:nowrap}
.atrs-val{font-size:12px;font-weight:700;color:var(--red);text-align:right;min-width:70px}

.chk-toggle{display:flex;align-items:center;gap:4px;flex-shrink:0;cursor:pointer;padding:3px 7px;border-radius:20px;border:1px solid var(--border2);background:var(--bg4);font-size:10px;font-weight:600;color:var(--text3);transition:.15s;user-select:none;-webkit-tap-highlight-color:transparent}
.chk-toggle:hover{border-color:var(--border2);background:var(--bg3)}
.chk-toggle.pago{background:var(--green3);border-color:var(--green2);color:var(--green)}
.chk-toggle.recebido{background:var(--green3);border-color:var(--green2);color:var(--green)}
.chk-toggle.atrasado{background:var(--red3);border-color:var(--red2);color:var(--red)}

.dia-badge{display:inline-flex;align-items:center;justify-content:center;min-width:26px;height:20px;background:var(--bg4);border:1px solid var(--border2);border-radius:4px;font-size:10px;font-weight:700;color:var(--text2);flex-shrink:0;padding:0 4px}
.dia-inp{width:32px;background:var(--bg4);border:1px solid var(--border2);border-radius:4px;font-size:10px;font-weight:700;color:var(--text2);text-align:center;padding:2px 3px;font-family:var(--font);outline:none}
.dia-inp:focus{border-color:var(--blue);color:var(--text)}

.juros-box{margin-top:8px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:8px 10px}
.juros-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px}
.juros-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:4px}
.juros-inp{width:62px;background:var(--bg3);border:1px solid var(--border2);border-radius:4px;color:var(--text);font-size:11px;padding:3px 6px;font-family:var(--font);outline:none;text-align:right}
.juros-inp:focus{border-color:var(--blue)}
.juros-prev{font-size:12px;font-weight:700;color:var(--orange);margin-top:4px}
.juros-aviso{font-size:10px;color:var(--text3);font-style:italic;margin-top:3px;line-height:1.4}
</style>
</head>
<body>

<div class="app">
<div class="topbar">
  <div class="topbar-row1">
    <div class="topbar-logo">💰 Finanças</div>
    <div class="year-select">
      <span style="font-size:11px;color:var(--text2)">ANO</span>
      <select id="YS" onchange="setAno(+this.value)"></select>
    </div>
    <button class="year-add-btn" onclick="addAno()">+ Ano</button>
    <div style="display:flex;gap:6px;margin-left:auto;flex-shrink:0">
      <button class="year-add-btn" id="drive-btn" onclick="driveAction()" title="Google Drive" style="display:flex;align-items:center;gap:4px;padding:4px 8px">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M4.5 20L1 14l5.5-9.5h11L23 14l-3.5 6H4.5z" fill="#4285F4" opacity=".3"/><path d="M8.5 4.5L3 14h6l5.5-9.5H8.5z" fill="#0066DA"/><path d="M15.5 4.5H9L14.5 14H21L15.5 4.5z" fill="#00AC47"/><path d="M3 14l3.5 6h11l3.5-6H3z" fill="#FFBA00"/></svg>
        <span id="drive-btn-txt">Entrar</span>
      </button>
      <button class="year-add-btn" onclick="abrirPopupPagamentos()" title="Atualizar pagamentos" style="color:var(--orange);border-color:var(--orange2)">🔔</button>
      <button class="year-add-btn" onclick="importarDados()" title="Importar arquivo local">📂</button>
      <button class="year-add-btn" id="local-export-btn" onclick="exportarDados()" title="Exportar local" style="color:var(--green);border-color:var(--green2)">💾</button>
    </div>
  </div>
  <div class="topbar-row2">
    <div class="nav" id="NAV"></div>
  </div>
</div>
<div class="main" id="MC"></div>
</div>
<div id="MR"></div><div id="AR"></div>
<script>
const MONTHS=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
const CARTOES=['Nubank','Mercado Pago','Itaú','Outro'];
const CTAG={Nubank:'tnu','Mercado Pago':'tmp','Itaú':'tit',Outro:'tou'};
const SK='fp_v5';

const DEF={
  "anos": [
    2024
  ],
  "anoAtivo": 2024,
  "config": {
    "limiteReserva": 3000,
    "limiteParcMensal": 800,
    "_popupVisto": ""
  },
  "dados": {
    "2024": {
      "entradas": [],
      "despesas": [],
      "pc": [],
      "pd": [],
      "cc": {
        "nubank": 0,
        "itau": 0,
        "mp": 0
      },
      "obE": [],
      "obD": []
    }
  },
  "res": [],
  "avisos": [],
  "obE": [],
  "obD": [],
  "_id": 1,
  "chk": {}
};

let _mudou=false;
let S=load();
let tab='home',mes=new Date().getMonth(),charts={};

function load(){try{return JSON.parse(JSON.stringify(DEF));}catch(e){return JSON.parse(JSON.stringify(DEF));}}
function save(){_mudou=true; try{const b=document.getElementById('unsaved-banner'); if(b) b.style.display='flex';}catch(e){} }
function nid(){return 'x'+(S._id++);}
function D(){
  const d=S.dados[S.anoAtivo];
  if(!d){S.dados[S.anoAtivo]={entradas:[],despesas:[],pc:[],pd:[],cc:{nubank:0,itau:0,mp:0},obE:[],obD:[]};save();}
  if(!d.obE) d.obE=[];
  if(!d.obD) d.obD=[];
  return S.dados[S.anoAtivo];
}
// obE/obD do ano ativo
function OBE(){return D().obE||[];}
function OBD(){return D().obD||[];}
function fmt(v){const s=Math.abs(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});return(v<0?'-':'')+'R$ '+s;}
function fabs(v){return Math.abs(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function pv(s){if(typeof s!=='string')s=String(s||'');return Math.abs(parseFloat(s.replace(/R\$\s*/g,'').replace(/\s/g,'').replace(/\./g,'').replace(',','.'))||0);}
function td(){return new Date().toISOString().slice(0,10);}
function fd(s){if(!s)return '';const[y,m,d]=s.split('-');return d+'/'+m;}
function fdf(s){if(!s)return '';const[y,m,d]=s.split('-');return d+'/'+m+'/'+y;}
function dm(s){if(!s)return new Date().getMonth();return Math.max(0,parseInt(s.split('-')[1]||1)-1);}


// cálculos
function tE(i){return D().entradas.reduce((s,r)=>s+(r.vals[i]||0),0);}
function tD(i){return D().despesas.reduce((s,r)=>s+(r.vals[i]||0),0)+tPDM(i);}
function sal(i){return tE(i)-tD(i);}
function tPCM(i){
  // i = índice do mês (0-11) no ano ativo
  // Para parcelados cross-year: calcular posição absoluta
  const anoAtual=S.anoAtivo;
  return D().pc.reduce((s,p)=>{
    const anoIni=p.anoIni||anoAtual;
    const mIniAbs=anoIni*12+p.ini; // mês absoluto de início
    const ef=p.n-(p.ant||0);
    const mFimAbs=mIniAbs+ef-1;
    const mAbs=anoAtual*12+i; // mês absoluto atual
    return(mAbs>=mIniAbs&&mAbs<=mFimAbs)?s+p.vp:s;
  },0);
}
function tPDM(i){
  const anoAtual=S.anoAtivo;
  return D().pd.reduce((s,p)=>{
    const anoIni=p.anoIni||anoAtual;
    const mIniAbs=anoIni*12+p.ini;
    const mFimAbs=mIniAbs+p.n-1;
    const mAbs=anoAtual*12+i;
    return(mAbs>=mIniAbs&&mAbs<=mFimAbs)?s+p.valor:s;
  },0);
}
function tPM(i){return tPCM(i)+tPDM(i);}
function tPA(){return MONTHS.reduce((s,_,i)=>s+tPM(i),0);}
function rSiAno(r,ano){
  ano=ano||S.anoAtivo;
  return rSiAnoCalc(r,ano);
}
function rSaldo(r,ano){
  ano=ano||S.anoAtivo;
  const si=rSiAno(r,ano);
  const movsFiltrados=r.movs.filter(m=>(m.data||'').startsWith(String(ano)));
  return si+movsFiltrados.reduce((s,m)=>s+(m.t==='e'?m.v:-m.v),0);
}
function rSaldoTotal(r){
  // saldo considerando TODOS os movimentos (para exibição cross-year)
  return (r.si||rSiAno(r,Math.min(...S.anos)))+r.movs.reduce((s,m)=>s+(m.t==='e'?m.v:-m.v),0);
}
function resDoAno(ano){
  ano=ano||S.anoAtivo;
  return S.res.filter(r=>{
    const ini=r.anoInicio||Math.min(...S.anos);
    const fim=r.anoFim||9999; // sem anoFim = continua para sempre
    return ano>=ini&&ano<=fim;
  });
}
// siPorAno: garante saldo inicial calculado para qualquer ano
function rSiAnoCalc(r,ano){
  // Se já tem registro direto, usa
  if(r.siPorAno&&r.siPorAno[String(ano)]!=null) return r.siPorAno[String(ano)];
  // Calcula acumulando desde o anoInicio
  const anoIni=r.anoInicio||Math.min(...S.anos);
  let saldo=r.siPorAno?( r.siPorAno[String(anoIni)]||r.si||0):(r.si||0);
  for(let a=anoIni;a<ano;a++){
    const movs=r.movs.filter(m=>(m.data||'').startsWith(String(a)));
    saldo+=movs.reduce((s,m)=>s+(m.t==='e'?m.v:-m.v),0);
    // Guardar cache
    if(!r.siPorAno) r.siPorAno={};
    r.siPorAno[String(a+1)]=saldo;
  }
  return saldo;
}
function rTot(ano){
  return resDoAno(ano).reduce((s,r)=>{
    const sr=r.sr!=null&&String(r.srd||'').startsWith(String(ano||S.anoAtivo))?r.sr:null;
    return s+(sr!=null?sr:rSaldo(r,ano));
  },0);
}
function rE(r,i,ano){ano=ano||S.anoAtivo;return r.movs.filter(m=>dm(m.data)===i&&(m.data||'').startsWith(String(ano))&&m.t==='e').reduce((s,m)=>s+m.v,0);}
function rS(r,i,ano){ano=ano||S.anoAtivo;return r.movs.filter(m=>dm(m.data)===i&&(m.data||'').startsWith(String(ano))&&m.t==='s').reduce((s,m)=>s+m.v,0);}
function tDA(i){return D().despesas.filter(d=>d.da).reduce((s,d)=>s+(d.vals[i]||0),0);}
function tFR(i){return D().entradas.filter(e=>e.tag==='freela').reduce((s,e)=>s+(e.vals[i]||0),0);}

// setup year
function setupY(){const ys=document.getElementById('YS');if(!ys)return;ys.innerHTML=S.anos.map(a=>`<option value="${a}"${a===S.anoAtivo?' selected':''}>${a}</option>`).join('');}
function setAno(a){S.anoAtivo=a;save();renderAll();}
function addAno(){
  const novo=Math.max(...S.anos)+1;
  if(S.anos.includes(novo))return;
  S.anos.push(novo);
  if(!S.dados[novo]){
    const ant=S.dados[Math.max(...S.anos.filter(a=>a<novo))||S.anoAtivo]||{};
    S.dados[novo]={entradas:[],despesas:[],pc:[],pd:[],cc:{nubank:0,itau:0,mp:0},obE:[...(ant.obE||[])],obD:[...(ant.obD||[])]};
    // propagar fixas
    S.anos.filter(a=>a<novo).forEach(a=>{
      const d=S.dados[a];if(!d)return;
      d.entradas&&d.entradas.filter(e=>e.fixa&&(e.fixaScope==='always'||e.fixaScope===String(novo))).forEach(e=>S.dados[novo].entradas.push({...e,id:nid(),vals:[...e.vals]}));
      d.despesas&&d.despesas.filter(x=>x.fixa&&(x.fixaScope==='always'||x.fixaScope===String(novo))).forEach(x=>S.dados[novo].despesas.push({...x,id:nid(),vals:[...x.vals]}));
    });
    // propagar reservas sem anoFim para novo ano (garantir siPorAno)
    S.res.filter(r=>!r.anoFim&&(r.anoInicio||0)<=novo).forEach(r=>{
      if(!r.siPorAno) r.siPorAno={};
      if(r.siPorAno[String(novo)]==null) rSiAnoCalc(r,novo);
    });
    // propagar parcelados cross-year
    S.anos.filter(a=>a<novo).forEach(a=>{
      const d=S.dados[a];if(!d)return;
      (d.pc||[]).forEach(p=>{
        const anoIni=p.anoIni||a;
        const mesesTotais=p.n-(p.ant||0);
        const mIniAbs=anoIni*12+p.ini;
        const mFimAbs=mIniAbs+mesesTotais-1;
        const mNovoIni=novo*12;
        if(mFimAbs>=mNovoIni){
          // parcela ainda ativa no novo ano — adicionar ao pc do novo ano
          const jaPropagado=S.dados[novo].pc.some(x=>x._origemId===p.id);
          if(!jaPropagado){
            const antNovo=Math.max(0,mNovoIni-mIniAbs);
            S.dados[novo].pc.push({...p,id:nid(),_origemId:p.id,anoIni,ant:antNovo});
          }
        }
      });
    });
  }
  save();setupY();setAno(novo);
}

function genIns(){
  const ins=[];
  const anoHoje=new Date().getFullYear();
  const m0=(S.anoAtivo<anoHoje)?11:new Date().getMonth();
  const tr=rTot();const lr=S.config.limiteReserva||3000;const lp=S.config.limiteParcMensal||800;
  if(tr<lr) ins.push({t:'bad',m:`🚨 Reservas (${fmt(tr)}) abaixo do limite crítico de ${fmt(lr)}. Recomponha antes de qualquer gasto extra.`});
  else if(tr>lr*3) ins.push({t:'good',m:`✅ Reservas (${fmt(tr)}) estão ${((tr/lr-1)*100).toFixed(0)}% acima do mínimo. Boa posição!`});
  const mOv=MONTHS.map((_,i)=>({m:MONTHS[i],v:tPM(i)})).filter(x=>x.v>lp);
  if(mOv.length) ins.push({t:'warn',m:`⚠️ Limite de parcelas ultrapassado em: ${mOv.map(x=>`${x.m}(${fmt(x.v)})`).join(', ')}.`});
  const enc=D().pc.filter(p=>{const ef=p.n-(p.ant||0);return p.ini+ef<=m0+2;});
  if(enc.length) ins.push({t:'good',m:`🎉 ${enc.length} compra(s) encerrando em breve: ${enc.map(p=>p.desc).join(', ')}. Vai liberar consumo!`});
  const sM=sal(m0);
  if(sM<0) ins.push({t:'bad',m:`📉 ${MONTHS[m0]} com saldo negativo (${fmt(sM)}). Revise as despesas.`});
  else if(sM>2000) ins.push({t:'good',m:`💰 ${MONTHS[m0]} com bom saldo (${fmt(sM)}). Considere aportar nas reservas.`});
  const totF=MONTHS.reduce((s,_,i)=>s+tFR(i),0);
  if(totF>0){const totE2=MONTHS.reduce((s,_,i)=>s+tE(i),0);ins.push({t:'good',m:`🎯 Freelas somam ${fmt(totF)} em ${S.anoAtivo} (${totE2>0?((totF/totE2)*100).toFixed(0):0}% das entradas).`});}
  const crescR=resDoAno().map(r=>{const ano=S.anoAtivo;const mv=r.movs.filter(m=>(m.data||'').startsWith(String(ano)));return{nome:r.nome,liq:mv.filter(m=>m.t==='e').reduce((s,m)=>s+m.v,0)-mv.filter(m=>m.t==='s').reduce((s,m)=>s+m.v,0)};}).sort((a,b)=>b.liq-a.liq);
  if(crescR[0]&&crescR[0].liq>0) ins.push({t:'good',m:`📈 Reserva "${crescR[0].nome}" teve o maior crescimento líquido este ano (${fmt(crescR[0].liq)}).`});
  if(!ins.length) ins.push({t:'good',m:`✅ Finanças em ordem. Continue monitorando e mantendo reservas acima de ${fmt(lr)}.`});
  return ins;
}

  // salva no orçamento
  const ob=(tipo==='e'?OBE():OBD()).find(x=>x.id===id);
  if(ob) ob.dia=dia;
  // propaga para os dados mensais do ano ativo
  const arr=tipo==='e'?D().entradas:D().despesas;
  const item=arr.find(x=>x.id===id||x.nome===(ob&&ob.nome));
  if(item) item.dia=dia;
  save();

function getDia(id, tipo){
  // busca dia no orçamento primeiro (fonte de verdade), depois no dado mensal
  const ob=(tipo==='e'?OBE():OBD()).find(x=>x.id===id);
  if(ob&&ob.dia) return ob.dia;
  const arr=tipo==='e'?D().entradas:D().despesas;
  const item=arr.find(x=>x.id===id);
  return item&&item.dia?item.dia:null;
}

function getAtrasados(){
  const m0=new Date().getMonth();
  const d2=D();
  const atrasados=[];
  if(!S.chk) return atrasados;

  // Despesas fixas/mensais
  d2.despesas.forEach(d=>{
    for(let mi=0;mi<m0;mi++){
      if((d.vals[mi]||0)===0) continue; // não tinha valor nesse mês
      const k=chkKey(S.anoAtivo,mi,d.id);
      if(!S.chk[k]){
        atrasados.push({id:d.id,nome:d.nome,mes:mi,val:d.vals[mi],tipo:'despesa',tag:d.da?'D.A.':null});
      }
    }
  });

  // Parcelados
  d2.pd.forEach(p=>{
    for(let mi=p.ini;mi<Math.min(p.ini+p.n,m0);mi++){
      const k=chkKey(S.anoAtivo,mi,p.id);
      if(!S.chk[k]){
        atrasados.push({id:p.id,nome:p.desc,mes:mi,val:p.valor,tipo:'parc',tag:'P'});
      }
    }
  });

  // Cartões não entram em atrasados

  // Ordenar por mês mais antigo primeiro
  atrasados.sort((a,b)=>a.mes-b.mes);
  return atrasados;
}

function calcJurosAcumulado(g){
  // Para cada mês em atraso, calcula quanto de juros compostos acumulou
  // desde o dia de vencimento até hoje
  const j=getJuros(g.id);
  if(!j.taxa||j.taxa<=0) return null;

  const hoje=new Date();
  const taxaMensal=j.tipo==='anual'?Math.pow(1+j.taxa/100,1/12)-1:j.taxa/100;
  const m0=hoje.getMonth();
  const diaHoje=hoje.getDate();
  let totalPrincipal=0, totalJuros=0;

  g.meses.forEach(mi=>{
    const vp=g.val; // valor da parcela
    // meses de atraso: do mês de vencimento até hoje
    const mesesAtraso=(m0-mi)+(diaHoje>=( g.dia||1)?0:0); // aproximação mensal
    const fator=Math.pow(1+taxaMensal, mesesAtraso);
    const comJuros=vp*fator;
    totalPrincipal+=vp;
    totalJuros+=(comJuros-vp);
  });

  return {principal:totalPrincipal, juros:totalJuros, total:totalPrincipal+totalJuros};
}

function annEditPd(pi,mi,el){
  const pd=D().pd;
  const p=pd[pi]; if(!p) return;
  const val=pv(el.value); const oldVal=p.valor;
  if(val===oldVal) return;
  const doEdit=()=>{
    p.valor=val;
    el.value=fabs(val);
    save();
    requestAnimationFrame(()=>updateAnnTotals());
  };
  if(isPast(mi)){
    const diff=val-oldVal;
    // calcula quantos meses passados são afetados (todos os meses do parcelado que já passaram)
    const m0=new Date().getMonth();
    const mesesAfetados=[];
    for(let i=p.ini;i<p.ini+p.n&&i<12;i++) if(i<m0) mesesAfetados.push(MONTHS[i]);
    confirmPast([{
      desc:`Parcelado: <strong>${p.desc}</strong>`,
      tipo:diff<0?'negativo':'positivo',
      detalhe:`Valor por parcela: ${fmt(oldVal)} → ${fmt(val)} (${diff>0?'+':''}${fmt(diff)}/mês)`
    },{
      desc:`Meses passados afetados: ${mesesAfetados.join(', ')}`,
      tipo:'negativo',
      detalhe:`${mesesAfetados.length} mês(es) já encerrado(s) terão o valor alterado retroativamente`
    }], doEdit);
    el.value=fabs(oldVal);
  } else {
    doEdit();
  }
}
function annEdit(type,idx,mi,el){
  const val=pv(el.value);
  const d2=D();
  const arr=type==='e'?d2.entradas:d2.despesas;
  const item=arr[idx];
  const oldVal=item.vals[mi]||0;
  if(val===oldVal){return;}

  const doEdit=()=>{
    item.vals[mi]=val;
    save();
    el.style.color=val>0?(type==='e'?'var(--green)':'var(--red)'):'var(--text3)';
    el.value=val>0?fabs(val):'';
    requestAnimationFrame(()=>updateAnnTotals());
  };

  if(isPast(mi)){
    const diff=val-oldVal;
    const tipo=diff>0?'positivo':'negativo';
    confirmPast([{
      desc:`${type==='e'?'Entrada':'Despesa'}: <strong>${item.nome}</strong> em ${mesLabel(mi)}`,
      tipo,
      detalhe:`De ${fmt(oldVal)} → ${fmt(val)} (${diff>0?'+':''}${fmt(diff)} no fechamento de ${mesLabel(mi)})`
    }], doEdit);
    el.value=oldVal>0?fabs(oldVal):''; // restaura visual enquanto decide
  } else {
    doEdit();
  }
}

function updateAnnTotals(){
  MONTHS.forEach((_,i)=>{
    const et=document.getElementById(`ann-te-${i}`);if(et)et.textContent=fmt(tE(i));
    const dt=document.getElementById(`ann-td-${i}`);if(dt)dt.textContent=fmt(tD(i));
    const st=document.getElementById(`ann-sal-${i}`);if(st){const s=sal(i);st.textContent=fmt(s);st.style.color=s>=0?'var(--green)':'var(--red)';}
  });
  const teT=document.getElementById('ann-te-tot');if(teT)teT.textContent=fmt(MONTHS.reduce((s,_,i)=>s+tE(i),0));
  const tdT=document.getElementById('ann-td-tot');if(tdT)tdT.textContent=fmt(MONTHS.reduce((s,_,i)=>s+tD(i),0));
  const sT=document.getElementById('ann-sal-tot');if(sT){const s=MONTHS.reduce((a,_,i)=>a+sal(i),0);sT.textContent=fmt(s);sT.style.color=s>=0?'var(--green)':'var(--red)';}
}

function apOb(){
  const d2=D();
  OBE().forEach(ob=>{
    const m=d2.entradas.find(e=>e.nome===ob.nome);if(!m)return;
    if(ob.fixa) m.vals=Array(12).fill(ob.v);
    else if(ob.parc&&ob.v>0){const nv=Array(12).fill(0);for(let i=ob.pi||0;i<Math.min((ob.pi||0)+(ob.pn||1),12);i++)nv[i]=ob.v;m.vals=nv;}
  });
  OBD().filter(ob=>ob.fixa).forEach(ob=>{
    const m=d2.despesas.find(e=>e.nome===ob.nome);if(!m)return;
    m.vals=Array(12).fill(ob.v);
  });
  save();render();toast("✓ Aplicado em todos os meses (inclusive passados)!","orange");
}


// ── ORÇAMENTO FUTURO ──
function apObFuturo(){
  const m0=new Date().getMonth();
  const d2=D();
  let criados=0,atualizados=0;

  OBE().forEach(ob=>{
    if(!ob.fixa&&!ob.parc)return;
    let m=d2.entradas.find(e=>e.nome===ob.nome);
    if(!m){
      // Cria o item nas contas se não existe ainda
      m={id:nid(),nome:ob.nome,vals:Array(12).fill(0),tag:ob.tag||'',fixa:ob.fixa,sc:ob.sc||'always'};
      d2.entradas.push(m);criados++;
    } else { atualizados++; }
    if(ob.fixa) for(let i=m0;i<12;i++) m.vals[i]=ob.v;
    else if(ob.parc) for(let i=ob.pi||0;i<Math.min((ob.pi||0)+(ob.pn||1),12);i++) if(i>=m0) m.vals[i]=ob.v;
  });

  OBD().forEach(ob=>{
    if(!ob.fixa)return;
    let m=d2.despesas.find(e=>e.nome===ob.nome);
    if(!m){
      m={id:nid(),nome:ob.nome,vals:Array(12).fill(0),da:ob.da||false,fixa:ob.fixa,sc:ob.sc||'always'};
      d2.despesas.push(m);criados++;
    } else { atualizados++; }
    for(let i=m0;i<12;i++) m.vals[i]=ob.v;
  });

  save();render();
  const msg=[];
  if(criados) msg.push(`${criados} novo(s) criado(s)`);
  if(atualizados) msg.push(`${atualizados} atualizado(s)`);
  const _m0ap=(new Date().getFullYear()>S.anoAtivo)?11:new Date().getMonth();toast(`✓ ${msg.join(', ')} — ${MONTHS[_m0ap]} em diante!`,'green');
}

function pausarObD(i,meses){
  const m0=new Date().getMonth();
  const ob=OBD()[i];
  if(!ob) return;
  const d2=D();
  const m=d2.despesas.find(e=>e.nome===ob.nome);
  if(!m){toast('Despesa não encontrada nos meses','red');return;}
  for(let mi=m0;mi<Math.min(m0+meses,12);mi++) m.vals[mi]=0;
  save();render();toast(`⏸ "${ob.nome}" pausada por ${meses} ${meses===1?'mês':'meses'}!`,'orange');
}

function excluirObFuturo(i,tipo){
  const m0=new Date().getMonth();
  const ob=tipo==='e'?OBE()[i]:OBD()[i];
  if(!ob) return;
  const d2=D();
  const arr=tipo==='e'?d2.entradas:d2.despesas;
  const m=arr.find(e=>e.nome===ob.nome);
  if(m) for(let mi=m0;mi<12;mi++) m.vals[mi]=0;
  if(tipo==='e') OBE().splice(i,1); else OBD().splice(i,1);
  save();render();toast(`"${ob.nome}" removido daqui pra frente. Histórico preservado.`,'orange');
}

function editContaVal(tipo,idx,mi,el){
  const arr=tipo==='e'?D().entradas:D().despesas;
  const item=arr[idx]; if(!item)return;
  const val=pv(el.value); const oldVal=item.vals[mi]||0;
  if(val===oldVal)return;
  const doEdit=()=>{item.vals[mi]=val;el.value=fabs(val);save();};
  if(isPast(mi)){
    const diff=val-oldVal;
    confirmPast([{
      desc:`${tipo==='e'?'Entrada':'Despesa'}: <strong>${item.nome}</strong> em ${mesLabel(mi)}`,
      tipo:diff>0?'positivo':'negativo',
      detalhe:`De ${fmt(oldVal)} → ${fmt(val)} (${diff>0?'+':''}${fmt(diff)} no saldo de ${mesLabel(mi)})`
    }], doEdit);
    el.value=oldVal>0?fabs(oldVal):'';
  } else { doEdit(); }
}

function delContaItem(tipo,idx){
  const arr=tipo==='e'?D().entradas:D().despesas;
  if(arr.length<=1){toast('Precisa ter ao menos 1 item','red');return;}
  const item=arr[idx];if(!item)return;
  const m0=new Date().getMonth();
  // verifica se tem valores em meses passados
  const pastVals=item.vals.slice(0,m0).filter(v=>v>0);
  if(pastVals.length>0){
    const totalPast=pastVals.reduce((a,b)=>a+b,0);
    confirmPast([{
      desc:`Remover <strong>${item.nome}</strong> de todos os meses`,
      tipo:'negativo',
      detalhe:`Tem ${pastVals.length} meses passados com valor (total ${fmt(totalPast)}) que serão apagados do histórico`
    },{
      desc:`Meses futuros também serão removidos`,
      tipo:'neutro',
      detalhe:`${12-((new Date().getFullYear()>S.anoAtivo)?11:new Date().getMonth())} meses de ${MONTHS[(new Date().getFullYear()>S.anoAtivo)?11:new Date().getMonth()]} em diante`
    }], ()=>{arr.splice(idx,1);save();render();});
  } else {
    arr.splice(idx,1);save();render();
  }
}

function setSR(ri,el){
  const v=el.value.trim();
  if(!v){S.res[ri].sr=null;S.res[ri].srd=null;save();render();return;}
  const nv=pv(v);const sa=rSaldo(S.res[ri],S.anoAtivo);const diff=nv-sa;
  S.res[ri].sr=nv;S.res[ri].srd=td();
  if(Math.abs(diff)<0.01){save();render();return;}
  // Pergunta se quer registrar ajuste
  const tipo=diff>0?'📈 Rendimento/Aporte não registrado':'⚠️ Retirada não registrada';
  const cor=diff>0?'var(--green)':'var(--red)';
  const sinal=diff>0?'+':'';
  om(`<div class="modal" onclick="event.stopPropagation()">
    <div class="mtitle">Diferença encontrada<button class="mclose" onclick="cm()">×</button></div>
    <div style="font-size:13px;color:var(--text2);margin-bottom:16px;line-height:1.6">
      <div>Anotado: <strong>${fmt(sa)}</strong></div>
      <div>Banco: <strong style="color:var(--blue)">${fmt(nv)}</strong></div>
      <div style="color:${cor};font-weight:600;margin-top:6px">${tipo}: ${sinal}${fmt(Math.abs(diff))}</div>
    </div>
    <div style="margin-bottom:12px">
      <div style="font-size:11px;color:var(--text2);margin-bottom:6px">Descrição do ajuste:</div>
      <input id="adj-desc" class="inp" value="${diff>0?'Rendimento/Aporte não registrado':'Retirada não registrada'}" style="width:100%"/>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap">
      <button class="btn bgh" onclick="cm();render()">Só atualizar valor</button>
      <button class="btn ${diff>0?'bg':'br'}" onclick="
        const desc=document.getElementById('adj-desc').value||'Ajuste de saldo';
        const mov={id:'adj'+Date.now(),t:'${diff>0?'e':'s'}',v:Math.abs(${diff}),data:td(),obs:desc,ajuste:true};
        S.res[${ri}].movs.push(mov);
        save();cm();render();
        toast('Ajuste registrado: ${sinal}${fmt(Math.abs(diff))}','${diff>0?'green':'orange'}');
      ">Registrar Ajuste</button>
    </div>
  </div>`);
  save();
}

async function analisarIA(){
  const t=document.getElementById('AVI').value.trim();if(!t){toast('Escreva um aviso primeiro','orange');return;}
  const box=document.getElementById('AIR');box.innerHTML=`<div style="color:var(--text2);font-size:12px">✨ Analisando…</div>`;
  const ctx={reservas:S.res.map(r=>({nome:r.nome,saldo:rSaldo(r),meta:r.meta})),parcelados:D().pc.map(p=>({desc:p.desc,n:p.n,ant:p.ant||0,ini:p.ini})),totReservas:rTot(),limiteReserva:S.config.limiteReserva,ano:S.anoAtivo,hoje:td()};
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:500,system:`Assistente financeiro pessoal. Dados: ${JSON.stringify(ctx)}. Responda em português de forma concisa.`,messages:[{role:'user',content:`Aviso: "${t}"\nA condição já foi atingida? O que devo saber?`}]})});
    const data=await resp.json();const msg=data.content?.[0]?.text||'Não foi possível analisar.';
    box.innerHTML=`<div class="ins good">${msg.replace(/\n/g,'<br>')}</div>`;
    S.avisos.push({id:nid(),txt:t,on:true,criado:td()});save();document.getElementById('AVI').value='';
  }catch(e){box.innerHTML=`<div class="ins bad">Erro ao conectar com a IA. Aviso salvo como lembrete.</div>`;salAviso();}
}

      <div style="background:var(--bg3);border-radius:var(--radius-sm);padding:12px;border:1px solid var(--border)">

function svAddD(){
  const nome=document.getElementById('ad-n').value.trim();const val=pv(document.getElementById('ad-v').value);
  const da=document.getElementById('ad-da').checked;
  if(!nome||!val){toast('Preencha nome e valor','orange');return;}

  if(_tipo.adT==='parc'){
    // despesa parcelada vai para pd[], não despesas[]
    const ini=+document.getElementById('ad-pi').value;
    const n=+document.getElementById('ad-pn').value||1;
    D().pd.push({id:nid(),desc:nome,valor:val,ini,n,obs:da?'D.A.':''});
    save();cm();
    const fim=Math.min(ini+n-1,11);
    showDetalhesParc(nome,val*n,n,val,ini,fim,'despesa',false);
  } else {
    const novo={id:nid(),nome,da,tag:'',fixa:false,fixaScope:'',vals:Array(12).fill(0)};
    if(_tipo.adT==='fixa'){
      novo.fixa=true;novo.fixaScope=document.getElementById('ad-sc').value;novo.vals=Array(12).fill(val);
    } else {
      // única

  om(`<div class="modal" onclick="event.stopPropagation()">

    <div class="fr"><div><div class="fl">Descrição</div><input id="sm-d" class="inp" placeholder="Ex: Geladeira nova"/></div></div>

    <div style="display:flex;gap:8px;margin-top:10px;margin-bottom:12px">
      <button class="btn bb bsm" onclick="runSim()">▶ Simular</button>
      <button class="btn bgh bsm" onclick="cm()">Cancelar</button>
    </div>
    <div id="SRs"></div>
  </div>`);
  // pre-selecionar mês atual
  requestAnimationFrame(()=>{const el=document.getElementById('sm-i');if(el)el.value=new Date().getMonth();});
}
function runSim(){
  const desc=document.getElementById('sm-d').value||'Compra';const total=pv(document.getElementById('sm-v').value);
  const n=+document.getElementById('sm-n').value||1;const ini=+document.getElementById('sm-i').value||0;
  if(!total){toast('Informe o valor','orange');return;}
  const vp=Math.round((total/n)*100)/100;const lp=S.config.limiteParcMensal||800;
  let rows='';let ov=0;
  for(let i=0;i<12;i++){
    const pa=tPM(i);const np=i>=ini&&i<ini+n?vp:0;const nt=pa+np;const ns=sal(i)-np;const isOv=nt>lp;
    if(np>0&&isOv)ov++;
    rows+=`<tr${isOv?' style="background:var(--red3)"':np>0?' style="background:var(--bg3)"':''}><td>${MONTHS[i]}</td><td class="rv" style="color:var(--orange)">${np>0?fmt(vp):'—'}</td><td class="rv" style="color:${nt>lp?'var(--red)':'var(--text)'}">${fmt(nt)}</td><td class="rv" style="color:${ns>=0?'var(--green)':'var(--red)'}">${fmt(ns)}</td>${isOv?`<td><span class="tag" style="background:var(--red3);color:var(--red);border-color:var(--red2)">Limite!</span></td>`:'<td></td>'}</tr>`;
  }
  document.getElementById('SRs').innerHTML=`
    <div style="background:var(--bg3);border-radius:var(--radius-sm);padding:12px;margin-bottom:12px;border:1px solid var(--border)">
      <div style="font-size:13px;font-weight:600;margin-bottom:8px">📊 "${desc}"</div>
      <div class="g2">
        <div><div style="font-size:11px;color:var(--text2)">Parcela mensal</div><div style="font-size:16px;font-weight:700;color:var(--orange)">${fmt(vp)}</div></div>
        <div><div style="font-size:11px;color:var(--text2)">Impacto total</div><div style="font-size:16px;font-weight:700;color:var(--red)">${fmt(n*vp)}</div></div>
      </div>
      ${ov>0?`<div style="font-size:12px;color:var(--red);margin-top:8px;background:var(--red3);padding:8px;border-radius:6px">⚠️ Ultrapassa o limite em ${ov} mês(es). Considere reduzir ou postergar.</div>`:`<div style="font-size:12px;color:var(--green);margin-top:8px">✅ Cabe dentro do limite mensal de ${fmt(lp)}.</div>`}
    </div>
    <div style="overflow-x:auto"><table class="tbl"><thead><tr><th>Mês</th><th class="rv">+Parcela</th><th class="rv">Total Parc.</th><th class="rv">Saldo</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>
    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="btn bb bsm" onclick="cnfSim('${desc}',${total},${n},${ini})">✓ Confirmar e adicionar</button>
      <button class="btn bgh bsm" onclick="document.getElementById('SRs').innerHTML=''">Limpar</button>
    </div>`;
}
function cnfSim(desc,total,n,ini){
  const vp=Math.round((total/n)*100)/100;
  const cartao=prompt('Cartão? (Nubank / Mercado Pago / Itaú / Outro)','Nubank')||'Outro';
  D().pc.push({id:nid(),desc,cartao,total,n,vp,ini,ant:0});save();cm();render();toast(`"${desc}" adicionado!`,'green');
}

async function driveSalvar(silent=false){
  if(!gdToken){toast('Conecte o Google Drive primeiro','orange');return;}
  try{
    const json=JSON.stringify(S,null,2);
    // Procura arquivo existente no appDataFolder
    const search=await fetch(`https://www.googleapis.com/drive/v3/files?q=name='${GD_FILE}'+and+trashed=false`,{headers:{Authorization:'Bearer '+gdToken}});
    const found=await search.json();
    const fileId=found.files&&found.files[0]?found.files[0].id:null;
    if(fileId){
      // Atualiza existente
      await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`,{
        method:'PATCH',headers:{Authorization:'Bearer '+gdToken,'Content-Type':'application/json'},body:json
      });
    } else {
      // Cria novo
      const meta=await fetch('https://www.googleapis.com/drive/v3/files',{
        method:'POST',headers:{Authorization:'Bearer '+gdToken,'Content-Type':'application/json'},
        body:JSON.stringify({name:GD_FILE,parents:['root']})
      });
      const {id}=await meta.json();
      await fetch(`https://www.googleapis.com/upload/drive/v3/files/${id}?uploadType=media`,{
        method:'PATCH',headers:{Authorization:'Bearer '+gdToken,'Content-Type':'application/json'},body:json
      });
    }
    _mudou=false;
    const b=document.getElementById('unsaved-banner');if(b)b.style.display='none';
    if(!silent) toast('✓ Salvo no Google Drive!','green'); else toast('☁ Auto-salvo no Drive','blue');
  }catch(e){toast('Erro ao salvar no Drive: '+e.message,'red');}
}

async function driveCarregar(){
  if(!gdToken){toast('Conecte o Google Drive primeiro','orange');return;}
  try{
    const search=await fetch(`https://www.googleapis.com/drive/v3/files?q=name='${GD_FILE}'+and+trashed=false`,{headers:{Authorization:'Bearer '+gdToken}});
    const found=await search.json();
    if(!found.files||!found.files[0]){toast('Nenhum dado salvo no Drive ainda','orange');return;}
    const fileId=found.files[0].id;
    const resp=await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,{headers:{Authorization:'Bearer '+gdToken}});
    const dados=await resp.json();
    if(!dados.anos||!dados.dados){toast('Arquivo inválido no Drive','red');return;}
    S=dados;_mudou=false;
    setupY();renderNav();render();
    toast('✓ Dados carregados do Google Drive!','green');
    document.getElementById('drive-banner').remove();
  }catch(e){toast('Erro ao carregar do Drive: '+e.message,'red');}
}

function exportarDados(){
  const json=JSON.stringify(S,null,2);
  const hoje=new Date().toISOString().slice(0,10);
  const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent)&&!window.MSStream;
  if(isIOS){
    const w=window.open();
    if(w){
      w.document.write('<pre style="word-break:break-all;font-size:11px">'+json.replace(/</g,'&lt;')+'</pre>');
      w.document.title='financas_backup_'+hoje+'.json';
      w.document.close();
      toast('Abriu em nova aba — pressione e segure para copiar ou compartilhar.','orange');
    } else {
      if(navigator.clipboard){navigator.clipboard.writeText(json).then(()=>toast('JSON copiado!','orange'));}
      else{toast('Ative popups para exportar no iOS.','red');}
    }
  } else {
    const blob=new Blob([json],{type:'application/json'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='financas_backup_'+hoje+'.json';
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
  }
  _mudou=false;
  const b=document.getElementById('unsaved-banner');if(b)b.style.display='none';
  toast('Backup exportado!','green');
}

function _processImport(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const dados=JSON.parse(ev.target.result);
      if(!dados.anos||!dados.dados){toast('Arquivo inválido!','red');return;}
      S=dados;_mudou=false;
      setupY();renderNav();render();
      toast('Dados restaurados com sucesso!','green');
    }catch(err){toast('Erro ao importar: arquivo inválido','red');}
  };
  reader.readAsText(file);
  e.target.value='';
}


// ── SVG CHARTS (sem dependências externas — funciona no iOS/Safari) ──
function fmt2k(v){return v>=1000?`R$${(v/1000).toFixed(1)}k`:`R$${v.toFixed(0)}`;}

function svgBar(el,labels,datasets,stacked){
  if(!el)return;
  const W=el.clientWidth||320,H=180,PL=48,PB=28,PT=10,PR=8;
  const cW=W-PL-PR,cH=H-PT-PB;
  const n=labels.length;
  // compute stacked totals or individual max
  let maxV=0;
  if(stacked){
    for(let i=0;i<n;i++){let s=0;datasets.forEach(d=>{s+=Math.max(0,d.data[i]||0);});maxV=Math.max(maxV,s);}
  } else {
    datasets.forEach(d=>{d.data.forEach(v=>{maxV=Math.max(maxV,Math.abs(v||0));});});
  }
  if(maxV===0)maxV=1;
  const grW=Math.floor((cW/n)*0.7);
  const gap=(cW/n)-grW;
  // y grid lines
  const ticks=4;
  let gridLines='',yLabels='';
  for(let t=0;t<=ticks;t++){
    const y=PT+cH-(t/ticks)*cH;
    const v=(maxV*t/ticks);
    gridLines+=`<line x1="${PL}" y1="${y}" x2="${W-PR}" y2="${y}" stroke="rgba(255,255,255,.05)" stroke-width="1"/>`;
    yLabels+=`<text x="${PL-4}" y="${y+4}" text-anchor="end" font-size="9" fill="#5C6480">${fmt2k(v)}</text>`;
  }
  // zero line
  const hasNeg=datasets.some(d=>d.data.some(v=>v<0));
  const zeroY=hasNeg?PT+cH*(maxV/(maxV*2)):PT+cH;
  let bars='',xLabels='',legend='';
  for(let i=0;i<n;i++){
    const x=PL+i*(cW/n)+gap/2;
    const lx=x+grW/2;
    xLabels+=`<text x="${lx}" y="${H-6}" text-anchor="middle" font-size="9" fill="#5C6480">${labels[i]}</text>`;
    if(stacked){
      let yOff=PT+cH;
      datasets.forEach(d=>{
        const v=Math.max(0,d.data[i]||0);
        const bH=v/maxV*cH;
        if(bH>0){
          yOff-=bH;
          bars+=`<rect x="${x}" y="${yOff}" width="${grW}" height="${bH}" fill="${d.color}99" rx="2"/>`;
        }
      });
    } else {
      const d=datasets[0];
      const v=d.data[i]||0;
      const col=v<0?(d.negColor||'#F05252'):(d.color||'#2DD4A0');
      const bH=Math.abs(v)/maxV*cH;
      const by=v>=0?PT+cH-bH:PT+cH;
      bars+=`<rect x="${x}" y="${by}" width="${grW}" height="${bH}" fill="${col}CC" rx="2"/>`;
    }
  }
  // legend
  let lx2=PL;
  datasets.forEach(d=>{
    legend+=`<rect x="${lx2}" y="2" width="8" height="8" fill="${d.color}" rx="1"/><text x="${lx2+10}" y="10" font-size="9" fill="#9BA3BF">${d.label}</text>`;
    lx2+=d.label.length*5.5+20;
  });
  el.innerHTML=`<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block">${legend}${gridLines}${yLabels}${bars}${xLabels}</svg>`;
}

function svgDonut(el,items){
  if(!el)return;
  const total=items.reduce((s,i)=>s+i.val,0);
  if(total===0){el.innerHTML='<div style="text-align:center;color:#5C6480;padding:20px;font-size:12px">Sem dados</div>';return;}
  const W=300,CX=100,CY=90,R=65,IR=38;
  let angle=-Math.PI/2,paths='',legends='';
  items.forEach((item,idx)=>{
    if(item.val<=0)return;
    const sweep=2*Math.PI*(item.val/total);
    const x1=CX+R*Math.cos(angle),y1=CY+R*Math.sin(angle);
    const x2=CX+R*Math.cos(angle+sweep),y2=CY+R*Math.sin(angle+sweep);
    const ix1=CX+IR*Math.cos(angle),iy1=CY+IR*Math.sin(angle);
    const ix2=CX+IR*Math.cos(angle+sweep),iy2=CY+IR*Math.sin(angle+sweep);
    const lg=sweep>Math.PI?1:0;
    paths+=`<path d="M${ix1},${iy1} L${x1},${y1} A${R},${R} 0 ${lg} 1 ${x2},${y2} L${ix2},${iy2} A${IR},${IR} 0 ${lg} 0 ${ix1},${iy1}" fill="${item.color}" stroke="#181C27" stroke-width="1.5"/>`;
    const pct=((item.val/total)*100).toFixed(0);
    legends+=`<g transform="translate(205,${15+idx*22})"><rect width="10" height="10" fill="${item.color}" rx="2"/><text x="14" y="9" font-size="10" fill="#9BA3BF">${item.label.slice(0,14)} ${pct}%</text></g>`;
    angle+=sweep;
  });
  el.innerHTML=`<svg viewBox="0 0 ${W} 180" width="100%" style="display:block">${paths}${legends}</svg>`;
}

function svgBarDual(el,labels,datasets,H=180){
  if(!el||datasets.length<2)return;
  const W=el.clientWidth||320,PL=48,PB=28,PT=16,PR=8;
  const cW=W-PL-PR,cH=H-PT-PB;
  const n=labels.length;
  const allVals=[...datasets[0].data,...datasets[1].data];
  let maxV=Math.max(...allVals.map(Math.abs));
  if(maxV===0)maxV=1;
  const grW=Math.floor((cW/n)*0.38);
  const slot=cW/n;
  const ticks=4;
  let gridLines='',yLabels='',bars='',xLabels='',legend='';
  for(let t=0;t<=ticks;t++){
    const y=PT+cH-(t/ticks)*cH;
    gridLines+=`<line x1="${PL}" y1="${y}" x2="${W-PR}" y2="${y}" stroke="rgba(255,255,255,.05)" stroke-width="1"/>`;
    yLabels+=`<text x="${PL-4}" y="${y+4}" text-anchor="end" font-size="9" fill="#5C6480">${fmt2k(maxV*t/ticks)}</text>`;
  }
  for(let i=0;i<n;i++){
    const cx=PL+i*slot+slot/2;
    xLabels+=`<text x="${cx}" y="${H-6}" text-anchor="middle" font-size="9" fill="#5C6480">${labels[i]}</text>`;
    datasets.forEach((d,di)=>{
      const v=Math.max(0,d.data[i]||0);
      const bH=v/maxV*cH;
      const x=cx+(di===0?-grW-1:1);
      const by=PT+cH-bH;
      if(bH>0) bars+=`<rect x="${x}" y="${by}" width="${grW}" height="${bH}" fill="${d.color}CC" rx="2"/>`;
    });
  }
  let lx=PL;
  datasets.forEach(d=>{
    legend+=`<rect x="${lx}" y="2" width="8" height="8" fill="${d.color}" rx="1"/><text x="${lx+10}" y="10" font-size="9" fill="#9BA3BF">${d.label}</text>`;
    lx+=d.label.length*5.5+20;
  });
  el.innerHTML=`<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block">${legend}${gridLines}${yLabels}${bars}${xLabels}</svg>`;
}

// ── POPUP ATUALIZAR PAGAMENTOS ──
function getIgnorados(ano,mes){ return (S.ignorados||{})[ano+'_'+mes]||[]; }
function ignorarItem(ano,mes,id){
  if(!S.ignorados) S.ignorados={};
  const k=ano+'_'+mes;
  if(!S.ignorados[k]) S.ignorados[k]=[];
  if(!S.ignorados[k].includes(id)) S.ignorados[k].push(id);
  save();
}

function getPendentesDoMes(ano,mes){
  // Retorna itens que têm valor naquele mês, não foram pagos e não foram ignorados
  const d=S.dados[ano]; if(!d) return [];
  const ignorados=getIgnorados(ano,mes);
  const resultado=[];
  const hoje=new Date();
  const diaHoje=hoje.getDate();

  d.despesas.forEach(item=>{
    if(!(item.vals[mes]>0)) return;
    const k=chkKey(ano,mes,item.id);
    if((S.chk||{})[k]) return; // já pago
    if(ignorados.includes(item.id)) return; // ignorado
    const dia=item.dia||null;
    resultado.push({id:item.id,nome:item.nome,val:item.vals[mes],dia,tag:item.da?'D.A.':null,tipo:'d'});
  });

  d.pd.forEach(p=>{
    if(mes<p.ini||mes>=p.ini+p.n) return;
    const k=chkKey(ano,mes,p.id);
    if((S.chk||{})[k]) return;
    if(ignorados.includes(p.id)) return;
    resultado.push({id:p.id,nome:p.desc,val:p.valor,dia:p.dia||null,tag:'P',tipo:'d'});
  });

  return resultado.sort((a,b)=>(a.dia||99)-(b.dia||99));
}

function deveAbrirPopup(){
  const hoje=new Date();
  const ano=S.anoAtivo;
  const mes=hoje.getMonth();
  const dia=hoje.getDate();

  // verifica se já mostrou hoje
  const ultimaVez=S.config._popupVisto||'';
  const hoje_str=hoje.toISOString().slice(0,10);
  if(ultimaVez===hoje_str) return false;

  // verifica se tem pendentes do mês atual com dia <= hoje
  const pend=getPendentesDoMes(ano,mes).filter(p=>!p.dia||p.dia<=dia);
  // ou atrasados de meses anteriores
  const atrasados=[];
  for(let mi=0;mi<mes;mi++){
    const p=getPendentesDoMes(ano,mi);
    if(p.length) atrasados.push(...p.map(x=>({...x,mes:mi})));
  }
  return pend.length>0||atrasados.length>0;
}

function marcarPagoPopup(id,mes,btnEl){
  if(!S.chk) S.chk={};
  S.chk[chkKey(S.anoAtivo,mes,id)]=true;
  save();
  const row=btnEl.closest('.popup-row');
  if(row){
    row.style.opacity='.4';
    row.style.pointerEvents='none';
    btnEl.textContent='✓ Pago';
    btnEl.className='btn bxs bg';
  }
  renderAtrasados();
  if(tab==='home') renderChkSection();
}

function abrirPopupPagamentos(){
  const hoje=new Date();
  const ano=S.anoAtivo;
  const mes=hoje.getMonth();
  const dia=hoje.getDate();

  const pendMes=getPendentesDoMes(ano,mes).filter(p=>!p.dia||p.dia<=dia);
  const atrasadosMeses=[];
  for(let mi=0;mi<mes;mi++){
    const p=getPendentesDoMes(ano,mi);
    if(p.length) atrasadosMeses.push({mes:mi,itens:p});
  }

  if(pendMes.length===0&&atrasadosMeses.length===0){
    toast('✓ Tudo em dia!','green');
    return;
  }

  function rowHtml(item,mi){
    const tagHtml=item.tag?`<span class="tag ${item.tag==='P'?'tpa':item.tag==='D.A.'?'tda':'tpa'}" style="font-size:9px;padding:1px 4px">${item.tag}</span>`:'';
    const diaHtml=item.dia?`<span style="font-size:10px;font-weight:700;color:var(--text3);min-width:18px;text-align:right">${item.dia}</span>`:'<span style="min-width:18px"></span>';
    return`<div class="popup-row" style="display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:6px;background:var(--bg3);margin-bottom:5px">
      ${diaHtml}
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap">
          <span style="font-size:13px;font-weight:500">${item.nome}</span>
          ${tagHtml}
        </div>
        <div style="font-size:11px;font-weight:700;color:var(--red);margin-top:1px">${fmt(item.val)}</div>
      </div>
      <div style="display:flex;gap:4px;flex-shrink:0">
        <button class="btn bxs bg" onclick="marcarPagoPopup('${item.id}',${mi},this)">✓ Pago</button>
        <button class="btn bxs bgh" title="Ignorar este mês" onclick="ignorarItem(${ano},${mi},'${item.id}');this.closest('.popup-row').remove()">✕</button>
      </div>
    </div>`;
  }

  const pendHtml=pendMes.length>0
    ? pendMes.map(p=>rowHtml(p,mes)).join('')
    : `<div style="font-size:12px;color:var(--text3);padding:8px;font-style:italic">Nada pendente para hoje.</div>`;

  const atrasHtml=atrasadosMeses.length>0
    ? `<div style="margin-top:14px">
        <div class="sec-hdr" onclick="toggleSec('popup-ant')" style="cursor:pointer;margin-bottom:6px">
          <span style="font-size:11px;font-weight:600;color:var(--red)">⚠ Meses anteriores (${atrasadosMeses.reduce((s,x)=>s+x.itens.length,0)} pendentes)</span>
          <button class="sec-tog" data-tog="popup-ant" style="flex-shrink:0">+</button>
        </div>
        <div id="popup-ant" style="display:none">
          ${atrasadosMeses.map(({mes:mi,itens})=>`
            <div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text3);margin:8px 0 4px;letter-spacing:.05em">${MONTHS[mi]}</div>
            ${itens.map(p=>rowHtml(p,mi)).join('')}
          `).join('')}
        </div>
      </div>`
    : '';

  // Marcar que mostrou hoje
  S.config._popupVisto=hoje.toISOString().slice(0,10);
  save();

  om(`<div class="modal" onclick="event.stopPropagation()" style="max-height:85vh;display:flex;flex-direction:column">
    <div class="mtitle" style="flex-shrink:0">
      📋 Atualizar Pagamentos — ${dia} de ${MONTHS[mes]}
      <button class="mclose" onclick="cm()">×</button>
    </div>
    <div style="font-size:12px;color:var(--text2);margin-bottom:12px;flex-shrink:0">
      Contas com vencimento até hoje que ainda não foram marcadas como pagas.
    </div>
    <div style="overflow-y:auto;flex:1;padding-right:4px">
      ${pendHtml}
      ${atrasHtml}
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px;flex-shrink:0;border-top:1px solid var(--border);padding-top:12px">
      <button class="btn bgh" onclick="cm()">Concluir</button>
    </div>
  </div>`);
}

function verificarPopupAoAbrir(){
  if(deveAbrirPopup()){
    setTimeout(()=>abrirPopupPagamentos(), 800);
  }
}
// ── INIT ──
function init(){try{setupY();renderNav();render();startAutoSave();verificarPopupAoAbrir();}catch(e){document.getElementById('MC').innerHTML='<div style="color:#F05252;padding:20px;font-size:13px">Erro ao iniciar: '+e.message+'</div>';}}
if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',init);}else{init();}
</script>
