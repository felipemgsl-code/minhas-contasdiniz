function csvSplitLine(line){
  const parts=[];let cur='',inQ=false;
  for(const ch of line){
    if(ch==='"'){inQ=!inQ;}
    else if(ch===','&&!inQ){parts.push(cur.trim());cur='';}
    else{cur+=ch;}
  }
  parts.push(cur.trim());
  return parts;
}

function processImportFatura(e, cartaoId, cartaoNome){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    const text=ev.target.result;
    const lines=text.split('\n').map(l=>l.trim()).filter(Boolean);
    if(!lines.length){toast('Arquivo vazio','red');return;}

    const header=lines[0].toLowerCase();
    if(!header.includes('date')&&!header.includes('title')&&!header.includes('amount')){
      toast('Formato inválido — precisa ter colunas date, title, amount','red');return;
    }
    const cols=lines[0].split(',').map(c=>c.trim().toLowerCase().replace(/"/g,''));
    const iDate=cols.indexOf('date'),iTitle=cols.indexOf('title'),iAmount=cols.indexOf('amount');
    if(iDate<0||iTitle<0||iAmount<0){toast('Colunas não encontradas','red');return;}

    const rows=[];
    for(let i=1;i<lines.length;i++){
      const parts=csvSplitLine(lines[i]);
      if(parts.length<3) continue;
      const date=parts[iDate]?.replace(/"/g,'').trim();
      const title=parts[iTitle]?.replace(/"/g,'').trim();
      // Smart amount parse: detect pt-BR (1.234,56) vs en-US (1234.56)
      const rawAmt=parts[iAmount]?.replace(/"/g,'').trim()||'';
      let amount;
      if(/,\d{2}$/.test(rawAmt)){
        // pt-BR format: 1.234,56 → remove dots, swap comma
        amount=parseFloat(rawAmt.replace(/\./g,'').replace(',','.'));
      } else {
        // en-US format: 1234.56 → parse directly
        amount=parseFloat(rawAmt.replace(/,/g,''));
      }
      if(!date||!title||isNaN(amount)||amount<=0) continue;

      const [y,m,d]=date.split('-').map(Number);
      const fatM=m<10?'0'+m:String(m);
      const fatura=y+'-'+fatM;
      const pm=title.match(/Parcela\s+(\d+)\/(\d+)/i);
      const is_parcela=!!pm;
      const is_antecipada=title.toLowerCase().includes('antecipada');

      rows.push({
        id:'imp_'+Date.now()+'_'+i,
        date,title,amount,
        cartao:cartaoNome,
        fatura,
        categoria:autoCategoria(title),
        is_parcela,is_antecipada,
        parcela_num:pm?+pm[1]:null,
        parcela_tot:pm?+pm[2]:null,
        _y:y,_m:m-1,_d:d,
      });
    }

    if(!rows.length){toast('Nenhum lançamento encontrado','red');return;}

    // Detect Parcela 1/N from this CSV
    const parc1=rows.filter(r=>r.is_parcela&&r.parcela_num===1&&!r.is_antecipada);
    // Dedupe by clean title + total parcelas
    const parcMap={};
    parc1.forEach(r=>{
      const cleanTitle=r.title.replace(/\s*-?\s*Parcela\s+\d+\/\d+/i,'').trim();
      const key=cleanTitle+'|'+r.parcela_tot;
      if(!parcMap[key]) parcMap[key]={
        desc:cleanTitle,
        n:r.parcela_tot,
        vp:r.amount,
        total:Math.round(r.amount*r.parcela_tot*100)/100,
        ini:r._m,
        iniYear:r._y,
        cartao:cartaoNome,
        _key:key,
      };
    });
    const parcDetected=Object.values(parcMap);

    if(!S.faturas)S.faturas=[];
    const faturasNovas=[...new Set(rows.map(r=>r.fatura))];
    const existing=faturasNovas.filter(fat=>
      S.faturas.some(t=>t.fatura===fat&&t.cartao===cartaoNome)||
      TX_DATA.some(t=>t.fatura===fat&&t.cartao===cartaoNome)
    );

    function doImport(selectedParcs){
      faturasNovas.forEach(fat=>{S.faturas=S.faturas.filter(t=>!(t.fatura===fat&&t.cartao===cartaoNome));});
      S.faturas.push(...rows);

      // Add selected parcelas to pc[]
      if(selectedParcs&&selectedParcs.length>0){
        selectedParcs.forEach(p=>{
          const ano=p.iniYear;
          if(!S.dados[ano]){S.dados[ano]={entradas:[],despesas:[],pc:[],pd:[],cc:{nubank:0,itau:0,mp:0},obE:[],obD:[]};}
          S.dados[ano].pc.push({
            id:nid(),desc:p.desc,cartao:p.cartao,
            total:p.total,n:p.n,vp:p.vp,
            ini:p.ini,anoIni:ano,ant:0,
          });
        });
      }

      save();renderNav();render();
      const parcMsg=selectedParcs&&selectedParcs.length>0?` · ${selectedParcs.length} parcelado(s) adicionado(s)`:'';
      toast('✓ '+rows.length+' lançamentos importados'+parcMsg,'green');
    }

    function showParcModal(onConfirm){
      if(!window._parcSel) window._parcSel={};
      parcDetected.forEach(p=>{ window._parcSel[p._key]=true; });
      window._parcDetected=parcDetected;
      window._parcOnConfirm=onConfirm;

      const rowsHtml=parcDetected.map((p,i)=>`
        <div style="display:flex;align-items:center;gap:10px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:6px">
          <input type="checkbox" id="parc_chk_${i}" data-key="${p._key}" checked style="width:16px;height:16px;accent-color:var(--green);flex-shrink:0"
            onchange="window._parcSel[this.dataset.key]=this.checked"/>
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.desc}</div>
            <div style="font-size:11px;color:var(--text2);margin-top:2px">${p.n}x de R$${p.vp.toLocaleString('pt-BR',{minimumFractionDigits:2})} = <strong>R$${p.total.toLocaleString('pt-BR',{minimumFractionDigits:2})}</strong> · início ${MONTHS[p.ini]}/${p.iniYear}</div>
          </div>
          <span class="tag tpa" style="flex-shrink:0">Nubank</span>
        </div>`).join('');

      om(`<div class="modal" onclick="event.stopPropagation()" style="max-width:520px">
        <div class="mtitle">📦 Parcelados detectados<button class="mclose" onclick="cm()">×</button></div>
        <div style="font-size:12px;color:var(--text2);margin-bottom:14px">
          Encontrei <strong>${parcDetected.length}</strong> compra(s) parcelada(s) iniciando nesta fatura.<br>
          Selecione quais deseja adicionar à aba <strong>Parcelados</strong>:
        </div>
        <div style="max-height:300px;overflow-y:auto;margin-bottom:14px">${rowsHtml}</div>
        <div style="display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap">
          <button class="btn bxs bgh" onclick="document.querySelectorAll('[id^=parc_chk_]').forEach(el=>{el.checked=true;window._parcSel[el.dataset.key]=true;})">Selecionar todos</button>
          <button class="btn bxs bgh" onclick="document.querySelectorAll('[id^=parc_chk_]').forEach(el=>{el.checked=false;window._parcSel[el.dataset.key]=false;})">Desmarcar todos</button>
        </div>
        <div style="border-top:1px solid var(--border);padding-top:12px;display:flex;gap:8px;justify-content:flex-end">
          <button class="btn bgh" onclick="cm();if(window._parcOnConfirm){window._parcOnConfirm([]);window._parcOnConfirm=null;}">Pular — só importar lançamentos</button>
          <button class="btn bg" onclick="const sel=(window._parcDetected||[]).filter(p=>window._parcSel[p._key]);cm();if(window._parcOnConfirm){window._parcOnConfirm(sel);window._parcOnConfirm=null;}">✓ Importar selecionados</button>
        </div>
      </div>`);

    }

    function runAfterDupCheck(onReady){
      if(existing.length>0){
        window._pendingImport=onReady;
        om(`<div class="modal" onclick="event.stopPropagation()">
          <div class="mtitle" style="color:var(--orange)">⚠️ Fatura já existe<button class="mclose" onclick="cm()">×</button></div>
          <div style="font-size:13px;color:var(--text2);margin-bottom:16px;line-height:1.6">
            As faturas <strong>${existing.map(f=>fmtFatura(f)).join(', ')}</strong> já existem para ${cartaoNome}.<br>Deseja substituir pelos dados do arquivo?
          </div>
          <div style="display:flex;gap:8px;justify-content:flex-end">
            <button class="btn bgh" onclick="cm();window._pendingImport=null">Cancelar</button>
            <button class="btn bo" onclick="cm();if(window._pendingImport){window._pendingImport();window._pendingImport=null;}">Substituir</button>
          </div>
        </div>`);
      } else {
        onReady();
      }
    }

    runAfterDupCheck(()=>{
      if(parcDetected.length>0){
        showParcModal((selectedParcs)=>doImport(selectedParcs));
      } else {
        doImport([]);
      }
    });
  };
  reader.readAsText(file);
}

function donutAnualSvg(txList, ano, cartaoId){
  // Filter by year from fatura field ("YYYY-MM")
  const txAno=txList.filter(t=>t.fatura&&t.fatura.startsWith(String(ano)));
  if(!txAno.length) return '<div style="text-align:center;color:var(--text3);padding:20px;font-size:12px">Sem dados para '+ano+'</div>';
  const totalAno=txAno.reduce((s,t)=>s+t.amount,0);
  const catTot={};
  txAno.forEach(t=>{const c=getTxCat(t);catTot[c]=(catTot[c]||0)+t.amount;});
  const items=Object.entries(catTot).sort((a,b)=>b[1]-a[1]);

  const CX=120,CY=120,R=100,IR=52;
  let angle=-Math.PI/2,paths='',legends='';
  const tipData=[];
  items.forEach(([cat,val])=>{
    const sweep=2*Math.PI*(val/totalAno);
    if(sweep<0.001) return;
    const x1=CX+R*Math.cos(angle),y1=CY+R*Math.sin(angle);
    const x2=CX+R*Math.cos(angle+sweep),y2=CY+R*Math.sin(angle+sweep);
    const ix1=CX+IR*Math.cos(angle),iy1=CY+IR*Math.sin(angle);
    const ix2=CX+IR*Math.cos(angle+sweep),iy2=CY+IR*Math.sin(angle+sweep);
    const lg=sweep>Math.PI?1:0;
    const col=getCatColorDyn(cat,0);const bgCol=getCatColorDyn(cat,1);
    const pct=((val/totalAno)*100).toFixed(1);
    const ti=tipData.length;
    const svgId='donutanual_'+cartaoId+'_'+ano;
    paths+=`<path class="donut-slice" data-si="${svgId}" data-i="${ti}" d="M${ix1.toFixed(2)},${iy1.toFixed(2)} L${x1.toFixed(2)},${y1.toFixed(2)} A${R},${R} 0 ${lg} 1 ${x2.toFixed(2)},${y2.toFixed(2)} L${ix2.toFixed(2)},${iy2.toFixed(2)} A${IR},${IR} 0 ${lg} 0 ${ix1.toFixed(2)},${iy1.toFixed(2)}" fill="${col}" stroke="#181C27" stroke-width="2" style="cursor:pointer;transition:opacity .15s"/>`;
    tipData.push({cat,val,pct,col});
    legends+=`<div style="display:flex;align-items:center;gap:6px;margin-bottom:5px"><div style="width:11px;height:11px;border-radius:3px;background:${col};flex-shrink:0"></div><span style="flex:1;font-size:12px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${cat}</span><span style="font-size:12px;font-weight:700;color:var(--text)">${pct}%</span><span style="font-size:11px;color:var(--text3);min-width:72px;text-align:right">R$${val.toLocaleString('pt-BR',{minimumFractionDigits:2})}</span></div>`;
    angle+=sweep;
  });
  const svgId='donutanual_'+cartaoId+'_'+ano;
  const tipJson=JSON.stringify(tipData).replace(/</g,'\u003c').replace(/>/g,'\u003e');
  return `<div style="display:flex;align-items:flex-start;gap:16px;flex-wrap:wrap">
    <div style="position:relative;flex-shrink:0">
      <svg id="${svgId}" viewBox="0 0 240 240" width="220" height="220" style="display:block">
        ${paths}
        <text x="${CX}" y="${CY-6}" text-anchor="middle" font-size="11" fill="#9BA3BF">Total</text>
        <text x="${CX}" y="${CY+12}" text-anchor="middle" font-size="16" fill="#E8EAF0" font-weight="700">R$${(totalAno/1000).toFixed(1)}k</text>
      </svg>
      <div id="tip-${svgId}" style="display:none;position:fixed;background:#1E2235;border:1px solid #353D60;border-radius:8px;padding:8px 12px;font-size:12px;color:#E8EAF0;pointer-events:none;z-index:800;box-shadow:0 4px 20px rgba(0,0,0,.5);max-width:200px;line-height:1.6"></div>
    </div>
    <div style="flex:1;min-width:160px;padding-top:6px">${legends}</div>
  </div>
  <script>(function(){const tipData=${tipJson};const el=document.getElementById('${svgId}');const tipEl=document.getElementById('tip-${svgId}');if(!el||!tipEl)return;el.querySelectorAll('.donut-slice').forEach(function(s){s.addEventListener('mousemove',function(e){const d=tipData[+s.dataset.i];tipEl.innerHTML='<strong style="color:'+d.col+'">'+d.cat+'</strong><br>R$'+d.val.toLocaleString('pt-BR',{minimumFractionDigits:2})+'<br>'+d.pct+'%';tipEl.style.display='block';tipEl.style.left=Math.min(e.clientX+14,window.innerWidth-210)+'px';tipEl.style.top=Math.max(e.clientY-10,8)+'px';s.style.opacity='.72';});s.addEventListener('mouseleave',function(){tipEl.style.display='none';s.style.opacity='1';});});})();<\/script>`;
}

function rCartaoTab(mc, cartaoId){
  const cartoes=getCartoesComFatura();
  const cartao=cartoes.find(c=>c.id===cartaoId);
  if(!cartao){mc.innerHTML='<div style="padding:20px;color:var(--text3)">Cartão não encontrado.</div>';return;}

  const txAll=getTxForCartao(cartaoId);
  if(!S.cartaoFiltros)S.cartaoFiltros={};
  if(!S.cartaoFiltros[cartaoId])S.cartaoFiltros[cartaoId]={tipos:['normal','parcela'],cats:[]};
  const filtros=S.cartaoFiltros[cartaoId];
  if(!S.cartaoFaturaAtiva)S.cartaoFaturaAtiva={};

  // Group by fatura
  const byFatura={};
  txAll.forEach(t=>{if(!byFatura[t.fatura])byFatura[t.fatura]=[];byFatura[t.fatura].push(t);});
  const faturas=Object.keys(byFatura).sort().reverse();
  if(!S.cartaoFaturaAtiva[cartaoId])S.cartaoFaturaAtiva[cartaoId]=faturas[0]||'';
  const faturaAtiva=S.cartaoFaturaAtiva[cartaoId];
  // Annual donut year state
  if(!S.cartaoAnoAnual)S.cartaoAnoAnual={};
  const anosDisp=[...new Set(faturas.map(f=>f.slice(0,4)))].sort().reverse();
  if(!S.cartaoAnoAnual[cartaoId])S.cartaoAnoAnual[cartaoId]=anosDisp[0]||'2026';
  const anoAnual=S.cartaoAnoAnual[cartaoId];

  function matchFiltro(t){
    const tipo=t.is_parcela?'parcela':'normal';
    if(!filtros.tipos.includes(tipo)) return false;
    if(filtros.cats.length>0&&!filtros.cats.includes(getTxCat(t))) return false;
    return true;
  }

  const txFatura=byFatura[faturaAtiva]||[];
  const txFiltered=txFatura.filter(matchFiltro);
  const totalFatura=txFiltered.reduce((s,t)=>s+t.amount,0);

  // Cat breakdown for active fatura
  const catTotals={};
  txFiltered.forEach(t=>{const c=getTxCat(t);catTotals[c]=(catTotals[c]||0)+t.amount;});
  const catItems=Object.entries(catTotals).sort((a,b)=>b[1]-a[1]);

  // ── DONUT with hover tooltip ─────────────────────────────────────────────
  function donutSvg(items, total, svgId){
    if(!items.length||!total) return '<div style="text-align:center;color:var(--text3);padding:20px;font-size:12px">Sem dados</div>';
    const CX=120,CY=120,R=100,IR=52;
    let angle=-Math.PI/2, paths='', legends='';
    const tipData=[];
    items.forEach((item)=>{
      const cat=item[0],val=item[1];
      const sweep=2*Math.PI*(val/total);
      if(sweep<0.001) return;
      const x1=CX+R*Math.cos(angle),y1=CY+R*Math.sin(angle);
      const x2=CX+R*Math.cos(angle+sweep),y2=CY+R*Math.sin(angle+sweep);
      const ix1=CX+IR*Math.cos(angle),iy1=CY+IR*Math.sin(angle);
      const ix2=CX+IR*Math.cos(angle+sweep),iy2=CY+IR*Math.sin(angle+sweep);
      const lg=sweep>Math.PI?1:0;
      const col=getCatColorDyn(cat,0);const bgCol=getCatColorDyn(cat,1);
      const pct=((val/total)*100).toFixed(1);
      const ti=tipData.length;
      paths+=`<path class="donut-slice" data-si="${svgId}" data-i="${ti}" d="M${ix1.toFixed(2)},${iy1.toFixed(2)} L${x1.toFixed(2)},${y1.toFixed(2)} A${R},${R} 0 ${lg} 1 ${x2.toFixed(2)},${y2.toFixed(2)} L${ix2.toFixed(2)},${iy2.toFixed(2)} A${IR},${IR} 0 ${lg} 0 ${ix1.toFixed(2)},${iy1.toFixed(2)}" fill="${col}" stroke="#181C27" stroke-width="2" style="cursor:pointer;transition:opacity .15s"/>`;
      tipData.push({cat,val,pct,col,bgCol});
      legends+=`<div style="display:flex;align-items:center;gap:6px;margin-bottom:5px"><div style="width:11px;height:11px;border-radius:3px;background:${col};flex-shrink:0"></div><span style="flex:1;font-size:12px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${cat}</span><span style="font-size:12px;font-weight:700;color:var(--text)">${pct}%</span><span style="font-size:11px;color:var(--text3);min-width:68px;text-align:right">R$${val.toLocaleString('pt-BR',{minimumFractionDigits:2})}</span></div>`;
      angle+=sweep;
    });
    const svgHtml=`<div style="position:relative;flex-shrink:0">
      <svg id="${svgId}" viewBox="0 0 240 240" width="220" height="220" style="display:block">
        ${paths}
        <text x="${CX}" y="${CY-6}" text-anchor="middle" font-size="11" fill="#9BA3BF">Total</text>
        <text x="${CX}" y="${CY+12}" text-anchor="middle" font-size="16" fill="#E8EAF0" font-weight="700">R$${(total/1000).toFixed(1)}k</text>
      </svg>
      <div id="tip-${svgId}" style="display:none;position:fixed;background:#1E2235;border:1px solid #353D60;border-radius:8px;padding:8px 12px;font-size:12px;color:#E8EAF0;pointer-events:none;z-index:800;box-shadow:0 4px 20px rgba(0,0,0,.5);max-width:200px;line-height:1.6"></div>
    </div>`;
    // Attach events after render via script tag
    const tipJson=JSON.stringify(tipData).replace(/</g,'\\u003c').replace(/>/g,'\\u003e');
    const scriptHtml=`<script>(function(){const tipData=${tipJson};const tipEl=document.getElementById('tip-${svgId}');document.getElementById('${svgId}').querySelectorAll('.donut-slice').forEach(function(el){el.addEventListener('mousemove',function(e){if(!tipEl)return;const d=tipData[+el.dataset.i];tipEl.innerHTML='<strong style="color:'+d.col+'">'+d.cat+'</strong><br>R$'+d.val.toLocaleString('pt-BR',{minimumFractionDigits:2})+'<br>'+d.pct+'%';tipEl.style.display='block';tipEl.style.left=Math.min(e.clientX+14,window.innerWidth-210)+'px';tipEl.style.top=Math.max(e.clientY-10,8)+'px';el.style.opacity='.72';});el.addEventListener('mouseleave',function(){if(tipEl)tipEl.style.display='none';el.style.opacity='1';});});})();<\/script>`;
    return `<div style="display:flex;align-items:flex-start;gap:16px;flex-wrap:wrap">${svgHtml}<div style="flex:1;min-width:160px;padding-top:6px">${legends}</div></div>${scriptHtml}`;
  }

  // ── ANNUAL BAR CHART ─────────────────────────────────────────────────────
  function barAnualSvg(){
    const W=Math.min(document.getElementById('MC').clientWidth-64,900)||600;
    const H=180,PL=44,PB=24,PT=8,PR=8;
    const cW=W-PL-PR,cH=H-PT-PB;
    // Group by fatura month (all tx with filter applied)
    const allFiltered=txAll.filter(matchFiltro);
    const byMonth={};
    allFiltered.forEach(t=>{const fat=t.fatura;if(!byMonth[fat])byMonth[fat]=0;byMonth[fat]+=t.amount;});
    const sortedFats=Object.keys(byMonth).sort();
    if(!sortedFats.length) return '';
    const maxV=Math.max(...Object.values(byMonth),1);
    const n=sortedFats.length;
    const slot=cW/n;
    const grW=Math.max(slot*0.6,4);
    let bars='',xL='',yL='',grid='';
    const ticks=4;
    for(let t=0;t<=ticks;t++){
      const y=PT+cH-(t/ticks)*cH;
      grid+=`<line x1="${PL}" y1="${y}" x2="${W-PR}" y2="${y}" stroke="rgba(255,255,255,.05)" stroke-width="1"/>`;
      yL+=`<text x="${PL-4}" y="${y+4}" text-anchor="end" font-size="9" fill="#5C6480">R$${(maxV*t/ticks/1000).toFixed(1)}k</text>`;
    }
    sortedFats.forEach((fat,i)=>{
      const v=byMonth[fat]||0;
      const bH=(v/maxV)*cH;
      const x=PL+i*slot+(slot-grW)/2;
      const by=PT+cH-bH;
      const isCur=fat===faturaAtiva;
      bars+=`<rect x="${x.toFixed(1)}" y="${by.toFixed(1)}" width="${grW.toFixed(1)}" height="${bH.toFixed(1)}" fill="${isCur?'var(--blue)':'#5B8AF0'}" opacity="${isCur?'1':'.55'}" rx="3" style="cursor:pointer" onclick="S.cartaoFaturaAtiva['${cartaoId}']='${fat}';render()"/>`;
      if(bH>16) bars+=`<text x="${(x+grW/2).toFixed(1)}" y="${(by+12).toFixed(1)}" text-anchor="middle" font-size="8" fill="rgba(255,255,255,.8)">${(v/1000).toFixed(1)}k</text>`;
      xL+=`<text x="${(PL+i*slot+slot/2).toFixed(1)}" y="${H-4}" text-anchor="middle" font-size="8" fill="${isCur?'var(--blue)':'#5C6480'}" font-weight="${isCur?'700':'400'}">${fmtFatura(fat)}</text>`;
    });
    return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block">${grid}${yL}${bars}${xL}</svg>`;
  }

  // ── ANNUAL CAT STACKED BAR ───────────────────────────────────────────────
  function barCatAnualSvg(){
    const W=Math.min(document.getElementById('MC').clientWidth-64,900)||600;
    const H=200,PL=44,PB=24,PT=10,PR=8;
    const cW=W-PL-PR,cH=H-PT-PB;
    const allFiltered=txAll.filter(matchFiltro);
    const byMonth={};
    allFiltered.forEach(t=>{
      const fat=t.fatura;const cat=getTxCat(t);
      if(!byMonth[fat])byMonth[fat]={};
      byMonth[fat][cat]=(byMonth[fat][cat]||0)+t.amount;
    });
    const sortedFats=Object.keys(byMonth).sort();
    if(!sortedFats.length) return '';
    // Get top cats by total
    const catTot={};
    allFiltered.forEach(t=>{const c=getTxCat(t);catTot[c]=(catTot[c]||0)+t.amount;});
    const topCats=Object.entries(catTot).sort((a,b)=>b[1]-a[1]).slice(0,8).map(x=>x[0]);
    const maxV=Math.max(...sortedFats.map(fat=>Object.values(byMonth[fat]).reduce((s,v)=>s+v,0)),1);
    const n=sortedFats.length;
    const slot=cW/n;
    const grW=Math.max(slot*0.6,4);
    let bars='',xL='',yL='',grid='';
    const ticks=4;
    for(let t=0;t<=ticks;t++){
      const y=PT+cH-(t/ticks)*cH;
      grid+=`<line x1="${PL}" y1="${y}" x2="${W-PR}" y2="${y}" stroke="rgba(255,255,255,.05)" stroke-width="1"/>`;
      yL+=`<text x="${PL-4}" y="${y+4}" text-anchor="end" font-size="9" fill="#5C6480">R$${(maxV*t/ticks/1000).toFixed(1)}k</text>`;
    }
    sortedFats.forEach((fat,i)=>{
      const x=PL+i*slot+(slot-grW)/2;
      const isCur=fat===faturaAtiva;
      let yOff=PT+cH;
      topCats.forEach(cat=>{
        const v=byMonth[fat][cat]||0;
        if(!v) return;
        const bH=(v/maxV)*cH;
        yOff-=bH;
        bars+=`<rect x="${x.toFixed(1)}" y="${yOff.toFixed(1)}" width="${grW.toFixed(1)}" height="${bH.toFixed(1)}" fill="${getCatColorDyn(cat,0)}" opacity="${isCur?'1':'.7'}" rx="1"/>`;
      });
      xL+=`<text x="${(PL+i*slot+slot/2).toFixed(1)}" y="${H-4}" text-anchor="middle" font-size="8" fill="${isCur?'var(--blue)':'#5C6480'}" font-weight="${isCur?'700':'400'}">${fmtFatura(fat)}</text>`;
    });
    // Legend
    let legend='';
    topCats.forEach((cat,i)=>{legend+=`<rect x="${PL+i*70}" y="1" width="8" height="8" fill="${getCatColorDyn(cat,0)}" rx="1"/><text x="${PL+i*70+10}" y="9" font-size="8" fill="#9BA3BF">${cat.slice(0,8)}</text>`;});
    return `<svg viewBox="0 0 ${W} ${H+12}" width="100%" style="display:block">${legend}${grid}${yL}${bars}${xL}</svg>`;
  }

  // ── FATURA SELECTOR PILLS ────────────────────────────────────────────────
  // Which faturas are from S.faturas (imported, deletable) vs TX_DATA (embedded)
  const importedFaturas=new Set((S.faturas||[]).filter(t=>t.cartao===cartao.nome).map(t=>t.fatura));

  const faturasPills=faturas.map(fat=>{
    const txF=(byFatura[fat]||[]).filter(matchFiltro);
    const tot=txF.reduce((s,t)=>s+t.amount,0);
    const isAtiva=fat===faturaAtiva;
    const isDeletable=importedFaturas.has(fat);
    return `<div style="display:inline-flex;flex-direction:column;align-items:stretch;flex-shrink:0">
      <div style="display:flex;align-items:center;gap:0">
        <button onclick="S.cartaoFaturaAtiva['${cartaoId}']='${fat}';render()" style="padding:6px 10px 6px 14px;border-radius:${isDeletable?'20px 0 0 20px':'20px'};font-size:11px;font-weight:600;cursor:pointer;border:1px solid ${isAtiva?'var(--blue2)':'var(--border)'};border-right:${isDeletable?'none':'1px solid '+(isAtiva?'var(--blue2)':'var(--border)')};background:${isAtiva?'var(--blue3)':'var(--bg3)'};color:${isAtiva?'var(--blue)':'var(--text2)'};font-family:var(--font);line-height:1.4">
          ${fmtFatura(fat)}<br><span style="font-size:10px;font-weight:400;color:${isAtiva?'var(--blue)':'var(--text3)'}">R$${tot.toLocaleString('pt-BR',{minimumFractionDigits:0})}</span>
        </button>${isDeletable?`<button onclick="delFatura('${cartao.nome}','${fat}')" title="Deletar fatura" style="padding:0 8px;border-radius:0 20px 20px 0;border:1px solid ${isAtiva?'var(--blue2)':'var(--border)'};border-left:none;background:${isAtiva?'var(--blue3)':'var(--bg3)'};color:var(--red);font-size:12px;cursor:pointer;font-family:var(--font);height:100%">✕</button>`:''}
      </div>
    </div>`;
  }).join('');

  // ── FILTER BAR ───────────────────────────────────────────────────────────
  const tipoFiltroHtml=`
    <label style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text2);cursor:pointer"><input type="checkbox" ${filtros.tipos.includes('normal')?'checked':''} onchange="toggleFiltroTipo('${cartaoId}','normal',this.checked)" style="accent-color:var(--green)"/> Normais</label>
    <label style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text2);cursor:pointer"><input type="checkbox" ${filtros.tipos.includes('parcela')?'checked':''} onchange="toggleFiltroTipo('${cartaoId}','parcela',this.checked)" style="accent-color:var(--green)"/> Parcelados</label>`;

  const catFiltroHtml=catItems.map(([cat])=>{
    const active=filtros.cats.includes(cat);
    const col=getCatColorDyn(cat,0);const bgCol=getCatColorDyn(cat,1);
    return `<button class="cat-pill" onclick="toggleFiltroCat('${cartaoId}','${cat}')" style="background:${active?bgCol:'var(--bg3)'};color:${active?col:'var(--text3)'};border-color:${active?col:'var(--border)'}">● ${cat}</button>`;
  }).join('');

  // ── TX LIST ──────────────────────────────────────────────────────────────
  const txHtml=txFiltered.length===0
    ?'<div style="text-align:center;color:var(--text3);padding:20px;font-size:12px">Nenhum lançamento com os filtros atuais.</div>'
    :txFiltered.map(t=>{
      const cat=getTxCat(t);
      const col=getCatColorDyn(cat,0);const bgCol=getCatColorDyn(cat,1);
      const isParcLabel=t.is_parcela?`<span style="font-size:9px;color:var(--orange);background:var(--orange3);border:1px solid var(--orange2);border-radius:3px;padding:0 4px;flex-shrink:0">${t.parcela_num}/${t.parcela_tot}</span>`:'';
      const isAntLabel=t.is_antecipada?'<span style="font-size:9px;color:var(--text3);margin-left:2px">antecip.</span>':'';
      return `<div class="tx-row">
        <span class="tx-date">${t.date.slice(8)+"/"+t.date.slice(5,7)}</span>
        <span class="tx-title" onclick="editTxCategoria('${t.id}')" title="Editar categoria">${t.title.replace(/</g,'&lt;')}</span>
        ${isParcLabel}${isAntLabel}
        <span class="tx-cat"><span class="cat-pill" onclick="editTxCategoria('${t.id}')" style="background:${bgCol};color:${col};border-color:${col}">${cat}</span></span>
        <span class="tx-val">R$${t.amount.toLocaleString('pt-BR',{minimumFractionDigits:2})}</span>
      </div>`;
    }).join('');

  // ── RENDER ───────────────────────────────────────────────────────────────
  mc.innerHTML=`
  <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:16px">
    <div>
      <div style="font-size:20px;font-weight:700">${cartao.emoji} ${cartao.nome}</div>
      <div style="font-size:12px;color:var(--text2);margin-top:2px">${faturas.length} faturas · ${txAll.length} lançamentos</div>
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      <button class="btn bb bsm" onclick="triggerImportFatura('${cartaoId}','${cartao.nome}')">📂 Importar fatura</button>
      <button class="btn bgh bsm" onclick="mGerenciarCats()">🏷️ Categorias</button>
    </div>
  </div>

  <div class="card" style="margin-bottom:12px">
    <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text2);margin-bottom:6px"> Selecionar fatura</div>
    <div style="overflow-x:auto;display:flex;gap:8px;padding-bottom:6px">${faturasPills}</div>
  </div>

  <div class="card" style="margin-bottom:12px;border-color:var(--red2)">
    <div style="display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:8px">
      <div>
        <div style="font-size:12px;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Fatura ${fmtFatura(faturaAtiva)}</div>
        <div style="font-size:36px;font-weight:800;color:var(--red);line-height:1">R$${totalFatura.toLocaleString('pt-BR',{minimumFractionDigits:2})}</div>
        <div style="font-size:12px;color:var(--text2);margin-top:4px">${txFiltered.length} lançamentos</div>
      </div>
      <div style="text-align:right">
        ${catItems.slice(0,3).map(([cat,val])=>`<div style="font-size:12px;color:var(--text2)"><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:${getCatColorDyn(cat,0)};margin-right:4px"></span>${cat}: <strong style="color:var(--text)">R$${val.toLocaleString('pt-BR',{minimumFractionDigits:0})}</strong></div>`).join('')}
      </div>
    </div>
  </div>

  <div class="card" style="margin-bottom:12px">
    <div class="ctit" style="margin-bottom:10px">📊 Gastos por categoria — ${fmtFatura(faturaAtiva)}</div>
    ${donutSvg(catItems, totalFatura, 'donut_'+cartaoId+'_'+faturaAtiva.replace('-',''))}
  </div>

  <div class="card" style="margin-bottom:12px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px">
      <div class="ctit" style="margin:0">📊 Gastos por categoria — Ano ${anoAnual}</div>
      <div style="display:flex;gap:6px">
        ${anosDisp.map(a=>`<button onclick="S.cartaoAnoAnual['${cartaoId}']='${a}';render()" style="padding:4px 12px;border-radius:16px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid ${a===anoAnual?'var(--blue2)':'var(--border)'};background:${a===anoAnual?'var(--blue3)':'var(--bg3)'};color:${a===anoAnual?'var(--blue)':'var(--text2)'};font-family:var(--font)">${a}</button>`).join('')}
      </div>
    </div>
    ${donutAnualSvg(txAll.filter(matchFiltro), +anoAnual, cartaoId)}
  </div>

  <div class="card" style="margin-bottom:12px">
    <div class="ctit" style="margin-bottom:8px">📈 Histórico anual de faturas</div>
    ${barAnualSvg()}
    <div style="font-size:10px;color:var(--text3);margin-top:4px">Clique numa barra para ver a fatura</div>
  </div>

  <div class="card" style="margin-bottom:12px">
    <div class="ctit" style="margin-bottom:8px">📊 Categorias por fatura (stacked)</div>
    ${barCatAnualSvg()}
  </div>

  <div class="card" style="margin-bottom:12px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:6px">
      <div class="ctit" style="margin:0">Filtros</div>
    </div>
    <div class="filter-bar">
      ${tipoFiltroHtml}
      <div style="width:1px;height:16px;background:var(--border);margin:0 4px"></div>
      <span style="font-size:11px;color:var(--text3)">Categoria:</span>
      ${catFiltroHtml}
      ${filtros.cats.length>0?`<button class="btn bxs bgh" onclick="S.cartaoFiltros['${cartaoId}'].cats=[];render()">Limpar</button>`:''}
    </div>
  </div>

  <div class="card">
    <div style="font-size:11px;color:var(--text2);margin-bottom:6px">Clique no nome ou na categoria para editar</div>
    ${txHtml}
  </div>`;
}

function toggleFiltroTipo(cartaoId, tipo, checked){
  if(!S.cartaoFiltros)S.cartaoFiltros={};
  if(!S.cartaoFiltros[cartaoId])S.cartaoFiltros[cartaoId]={tipos:['normal','parcela'],cats:[]};
  const f=S.cartaoFiltros[cartaoId];
  if(checked){if(!f.tipos.includes(tipo))f.tipos.push(tipo);}
  else{f.tipos=f.tipos.filter(t=>t!==tipo);}
  save();render();
}
function toggleFiltroCat(cartaoId, cat){
  if(!S.cartaoFiltros)S.cartaoFiltros={};
  if(!S.cartaoFiltros[cartaoId])S.cartaoFiltros[cartaoId]={tipos:['normal','parcela'],cats:[]};
  const f=S.cartaoFiltros[cartaoId];
  if(f.cats.includes(cat))f.cats=f.cats.filter(c=>c!==cat);
  else f.cats.push(cat);
  save();render();
}


function rAvi(mc){

async function analisarIA(){
  const t=document.getElementById('AVI').value.trim();if(!t){toast('Escreva um aviso primeiro','orange');return;}
  const box=document.getElementById('AIR');box.innerHTML=`<div style="color:var(--text2);font-size:12px">✨ Analisando…</div>`;
  const ctx={reservas:S.res.map(r=>({nome:r.nome,saldo:rSaldo(r),meta:r.meta})),parcelados:D().pc.map(p=>({desc:p.desc,n:p.n,ant:p.ant||0,ini:p.ini})),totReservas:rTot(),limiteReserva:S.config.limiteReserva,ano:S.anoAtivo,hoje:td()};
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:500,system:`Assistente financeiro pessoal. Dados: ${JSON.stringify(ctx)}. Responda em português de forma concisa.`,messages:[{role:'user',content:`Aviso: "${t}"\nA condição já foi atingida? O que devo saber?`}]})});
    const data=await resp.json();const msg=data.content?.[0]?.text||'Não foi possível analisar.';
    box.innerHTML=`<div class="ins good">${msg.replace(/\n/g,'<br>')}</div>`;
    S.avisos.push({id:nid(),txt:t,on:true,criado:td()});save();document.getElementById('AVI').value='';
  }catch(e){box.innerHTML=`<div class="ins bad">Erro ao conectar com a IA. Aviso salvo como lembrete.</div>`;salAviso();}
}

        <div style="font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Valor total</div>
        <div style="font-size:22px;font-weight:800;color:${cor}">${fmt(total)}</div>

      <div style="background:var(--bg3);border-radius:var(--radius-sm);padding:12px;border:1px solid var(--border)">

function svAddD(){
  const nome=document.getElementById('ad-n').value.trim();const val=pv(document.getElementById('ad-v').value);

    showDetalhesParc(nome,val*n,n,val,ini,fim,'despesa',false);

    const novo={id:nid(),nome,da,tag:'',fixa:false,fixaScope:'',vals:Array(12).fill(0)};

    const nv=pv(v);const sa=rSaldo(r);const diff=nv-sa;
    r.sr=nv;r.srd=td();
    if(diff<-0.01) al.push(`⚠️ "${r.nome}": banco (${fmt(nv)}) é ${fmt(Math.abs(diff))} MENOR. Possível retirada não registrada.`);
    else if(diff>0.01) al.push(`📈 "${r.nome}": banco (${fmt(nv)}) é ${fmt(diff)} MAIOR. Pode ser rendimento ou aporte não registrado.`);

  save();cm();render();

// SIMULAR
function mSim(){
  om(`<div class="modal" onclick="event.stopPropagation()">
    <div class="mtitle">🧮 Simular Compra<button class="mclose" onclick="cm()">×</button></div>
    <div class="fr"><div><div class="fl">Descrição</div><input id="sm-d" class="inp" placeholder="Ex: Geladeira nova"/></div></div>
    <div class="fr c3"><div><div class="fl">Valor Total (R$)</div><input id="sm-v" class="inp" placeholder="2.000,00"/></div><div><div class="fl">Nº Parcelas</div><input id="sm-n" class="inp" type="number" min="1" value="12"/></div><div><div class="fl">Mês início</div>${mIni('sm-i')}</div></div>
    <div style="display:flex;gap:8px;margin-top:10px;margin-bottom:12px">
      <button class="btn bb bsm" onclick="runSim()">▶ Simular</button>
      <button class="btn bgh bsm" onclick="cm()">Cancelar</button>
    </div>
    <div id="SRs"></div>
  </div>`);
  // pre-selecionar mês atual
  requestAnimationFrame(()=>{const el=document.getElementById('sm-i');if(el)el.value=new Date().getMonth();});
}
function runSim(){
  const desc=document.getElementById('sm-d').value||'Compra';const total=pv(document.getElementById('sm-v').value);
  const n=+document.getElementById('sm-n').value||1;const ini=+document.getElementById('sm-i').value||0;
  if(!total){toast('Informe o valor','orange');return;}
  const vp=Math.round((total/n)*100)/100;const lp=S.config.limiteParcMensal||800;
  let rows='';let ov=0;
  for(let i=0;i<12;i++){
    const pa=tPM(i);const np=i>=ini&&i<ini+n?vp:0;const nt=pa+np;const ns=sal(i)-np;const isOv=nt>lp;
    if(np>0&&isOv)ov++;
    rows+=`<tr${isOv?' style="background:var(--red3)"':np>0?' style="background:var(--bg3)"':''}><td>${MONTHS[i]}</td><td class="rv" style="color:var(--orange)">${np>0?fmt(vp):'—'}</td><td class="rv" style="color:${nt>lp?'var(--red)':'var(--text)'}">${fmt(nt)}</td><td class="rv" style="color:${ns>=0?'var(--green)':'var(--red)'}">${fmt(ns)}</td>${isOv?`<td><span class="tag" style="background:var(--red3);color:var(--red);border-color:var(--red2)">Limite!</span></td>`:'<td></td>'}</tr>`;
  }
  document.getElementById('SRs').innerHTML=`
    <div style="background:var(--bg3);border-radius:var(--radius-sm);padding:12px;margin-bottom:12px;border:1px solid var(--border)">
      <div style="font-size:13px;font-weight:600;margin-bottom:8px">📊 "${desc}"</div>
      <div class="g2">
        <div><div style="font-size:11px;color:var(--text2)">Parcela mensal</div><div style="font-size:16px;font-weight:700;color:var(--orange)">${fmt(vp)}</div></div>
        <div><div style="font-size:11px;color:var(--text2)">Impacto total</div><div style="font-size:16px;font-weight:700;color:var(--red)">${fmt(n*vp)}</div></div>
      </div>
      ${ov>0?`<div style="font-size:12px;color:var(--red);margin-top:8px;background:var(--red3);padding:8px;border-radius:6px">⚠️ Ultrapassa o limite em ${ov} mês(es). Considere reduzir ou postergar.</div>`:`<div style="font-size:12px;color:var(--green);margin-top:8px">✅ Cabe dentro do limite mensal de ${fmt(lp)}.</div>`}
    </div>
    <div style="overflow-x:auto"><table class="tbl"><thead><tr><th>Mês</th><th class="rv">+Parcela</th><th class="rv">Total Parc.</th><th class="rv">Saldo</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>
    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="btn bb bsm" onclick="cnfSim('${desc}',${total},${n},${ini})">✓ Confirmar e adicionar</button>
      <button class="btn bgh bsm" onclick="document.getElementById('SRs').innerHTML=''">Limpar</button>
    </div>`;
}
function cnfSim(desc,total,n,ini){
  const vp=Math.round((total/n)*100)/100;
  const cartao=prompt('Cartão? (Nubank / Mercado Pago / Itaú / Outro)','Nubank')||'Outro';
  D().pc.push({id:nid(),desc,cartao,total,n,vp,ini,ant:0});save();cm();render();toast(`"${desc}" adicionado!`,'green');
}

function svAnt(){

async function driveSalvar(silent=false){
  if(!gdToken){toast('Conecte o Google Drive primeiro','orange');return;}
  try{
    const json=JSON.stringify(S,null,2);
    // Procura arquivo existente no appDataFolder
    const search=await fetch(`https://www.googleapis.com/drive/v3/files?q=name='${GD_FILE}'+and+trashed=false`,{headers:{Authorization:'Bearer '+gdToken}});
    const found=await search.json();
    const fileId=found.files&&found.files[0]?found.files[0].id:null;
    if(fileId){
      // Atualiza existente
      await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`,{
        method:'PATCH',headers:{Authorization:'Bearer '+gdToken,'Content-Type':'application/json'},body:json
      });
    } else {
      // Cria novo
      const meta=await fetch('https://www.googleapis.com/drive/v3/files',{
        method:'POST',headers:{Authorization:'Bearer '+gdToken,'Content-Type':'application/json'},
        body:JSON.stringify({name:GD_FILE,parents:['root']})
      });
      const {id}=await meta.json();
      await fetch(`https://www.googleapis.com/upload/drive/v3/files/${id}?uploadType=media`,{
        method:'PATCH',headers:{Authorization:'Bearer '+gdToken,'Content-Type':'application/json'},body:json
      });
    }
    _mudou=false;
    const b=document.getElementById('unsaved-banner');if(b)b.style.display='none';
    if(!silent) toast('✓ Salvo no Google Drive!','green'); else toast('☁ Auto-salvo no Drive','blue');
  }catch(e){toast('Erro ao salvar no Drive: '+e.message,'red');}
}

async function driveCarregar(){
  if(!gdToken){toast('Conecte o Google Drive primeiro','orange');return;}
  try{
    const search=await fetch(`https://www.googleapis.com/drive/v3/files?q=name='${GD_FILE}'+and+trashed=false`,{headers:{Authorization:'Bearer '+gdToken}});
    const found=await search.json();
    if(!found.files||!found.files[0]){toast('Nenhum dado salvo no Drive ainda','orange');return;}
    const fileId=found.files[0].id;
    const resp=await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,{headers:{Authorization:'Bearer '+gdToken}});
    const dados=await resp.json();
    if(!dados.anos||!dados.dados){toast('Arquivo inválido no Drive','red');return;}
    S=dados;_mudou=false;
    setupY();renderNav();render();
    toast('✓ Dados carregados do Google Drive!','green');
    document.getElementById('drive-banner').remove();
  }catch(e){toast('Erro ao carregar do Drive: '+e.message,'red');}
}

function exportarDados(){
  const json=JSON.stringify(S,null,2);
  const hoje=new Date().toISOString().slice(0,10);
  const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent)&&!window.MSStream;
  if(isIOS){
    const w=window.open();
    if(w){
      w.document.write('<pre style="word-break:break-all;font-size:11px">'+json.replace(/</g,'&lt;')+'</pre>');
      w.document.title='financas_backup_'+hoje+'.json';
      w.document.close();
      toast('Abriu em nova aba — pressione e segure para copiar ou compartilhar.','orange');
    } else {
      if(navigator.clipboard){navigator.clipboard.writeText(json).then(()=>toast('JSON copiado!','orange'));}
      else{toast('Ative popups para exportar no iOS.','red');}
    }
  } else {
    const blob=new Blob([json],{type:'application/json'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='financas_backup_'+hoje+'.json';
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
  }
  _mudou=false;
  const b=document.getElementById('unsaved-banner');if(b)b.style.display='none';
  toast('Backup exportado!','green');
}

function importarDados(){
  document.getElementById('_imp_inp').click();

function _processImport(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const dados=JSON.parse(ev.target.result);
      if(!dados.anos||!dados.dados){toast('Arquivo inválido!','red');return;}
      S=dados;_mudou=false;
      setupY();renderNav();render();
      toast('Dados restaurados com sucesso!','green');
    }catch(err){toast('Erro ao importar: arquivo inválido','red');}
  };
  reader.readAsText(file);
  e.target.value='';
}


// ── SVG CHARTS (sem dependências externas — funciona no iOS/Safari) ──
function fmt2k(v){return v>=1000?`R$${(v/1000).toFixed(1)}k`:`R$${v.toFixed(0)}`;}

function _tip(e,html){
  if(!isModo('desktop'))return;
  const t=document.getElementById('svgTip');if(!t)return;
  t.innerHTML=html;t.style.display='block';
  t.style.left=Math.min(e.clientX+14,window.innerWidth-240)+'px';
  t.style.top=Math.max(e.clientY-10,8)+'px';
}
function _tipOff(){const t=document.getElementById('svgTip');if(t)t.style.display='none';}

// Encode tip data safely into data attribute (no inline template literals)
function _encodeTip(html){return encodeURIComponent(html);}
function _showTip(e,encoded){_tip(e,decodeURIComponent(encoded));}

function svgBar(el,labels,datasets,stacked){
  if(!el)return;
  const desktop=isModo('desktop');
  const W=el.clientWidth||320,H=desktop?240:180,PL=48,PB=28,PT=10,PR=8;
  const cW=W-PL-PR,cH=H-PT-PB;
  const n=labels.length;
  let maxV=0;
  if(stacked){
    for(let i=0;i<n;i++){let s=0;datasets.forEach(d=>{s+=Math.max(0,d.data[i]||0);});maxV=Math.max(maxV,s);}
  } else {
    datasets.forEach(d=>{d.data.forEach(v=>{maxV=Math.max(maxV,Math.abs(v||0));});});
  }
  if(maxV===0)maxV=1;
  const grW=Math.floor((cW/n)*(desktop?0.75:0.7));
  const gap=(cW/n)-grW;
  const ticks=4;
  let gridLines='',yLabels='';
  for(let t=0;t<=ticks;t++){
    const y=PT+cH-(t/ticks)*cH;
    gridLines+=`<line x1="${PL}" y1="${y}" x2="${W-PR}" y2="${y}" stroke="rgba(255,255,255,.05)" stroke-width="1"/>`;
    yLabels+=`<text x="${PL-4}" y="${y+4}" text-anchor="end" font-size="9" fill="#5C6480">${fmt2k(maxV*t/ticks)}</text>`;
  }
  let bars='',xLabels='',legend='',hits='';
  // store tip data indexed by bar
  const tipData=[];
  for(let i=0;i<n;i++){
    const x=PL+i*(cW/n)+gap/2;
    const lx=x+grW/2;
    xLabels+=`<text x="${lx}" y="${H-6}" text-anchor="middle" font-size="9" fill="#5C6480">${labels[i]}</text>`;
    let tipHtml='<strong style="color:#E8EAF0">'+labels[i]+'</strong><br>';
    if(stacked){
      let yOff=PT+cH;
      datasets.forEach(d=>{
        const v=Math.max(0,d.data[i]||0);
        const bH=v/maxV*cH;
        if(bH>0){
          yOff-=bH;
          bars+=`<rect x="${x}" y="${yOff}" width="${grW}" height="${bH}" fill="${d.color}99" rx="2"/>`;
          tipHtml+='<span style="color:'+d.color+'">&#9632;</span> '+d.label+': '+fmt(v)+'<br>';
        }
      });
    } else {
      const d=datasets[0];
      const v=d.data[i]||0;
      const col=v<0?(d.negColor||'#F05252'):(d.color||'#2DD4A0');
      const bH=Math.abs(v)/maxV*cH;
      const by=v>=0?PT+cH-bH:PT+cH;
      bars+=`<rect x="${x}" y="${by}" width="${grW}" height="${bH}" fill="${col}CC" rx="2"/>`;
      tipHtml+='<span style="color:'+col+'">&#9632;</span> '+fmt(v);
    }
    tipData.push(tipHtml);
    hits+=`<rect class="svgHit" data-i="${i}" x="${x-2}" y="${PT}" width="${grW+4}" height="${cH}" fill="transparent" style="cursor:crosshair"/>`;
  }
  let lx2=PL;
  datasets.forEach(d=>{
    legend+=`<rect x="${lx2}" y="2" width="8" height="8" fill="${d.color}" rx="1"/><text x="${lx2+10}" y="10" font-size="9" fill="#9BA3BF">${d.label}</text>`;
    lx2+=d.label.length*5.5+20;
  });
  el.innerHTML=`<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block">${legend}${gridLines}${yLabels}${bars}${hits}${xLabels}</svg>`;
  // attach events after render
  if(desktop){
    el.querySelectorAll('.svgHit').forEach(r=>{
      const i=+r.dataset.i;
      r.addEventListener('mousemove',e=>_tip(e,tipData[i]));
      r.addEventListener('mouseleave',_tipOff);
    });
  }
}

function svgDonut(el,items){
  if(!el)return;
  const desktop=isModo('desktop');
  const total=items.reduce((s,i)=>s+i.val,0);
  if(total===0){el.innerHTML='<div style="text-align:center;color:#5C6480;padding:20px;font-size:12px">Sem dados</div>';return;}
  // mobile: donut left + legend right (compact)
  // desktop: donut centered + legend below (no overlap)
  const CX=desktop?160:100,CY=desktop?100:90,R=desktop?75:65,IR=desktop?44:38;
  const W=desktop?320:300;
  let angle=-Math.PI/2,paths='',legends='';
  const tipDataD=[];
  const legendItems=[];
  items.forEach((item,idx)=>{
    if(item.val<=0)return;
    const sweep=2*Math.PI*(item.val/total);
    const x1=CX+R*Math.cos(angle),y1=CY+R*Math.sin(angle);
    const x2=CX+R*Math.cos(angle+sweep),y2=CY+R*Math.sin(angle+sweep);
    const ix1=CX+IR*Math.cos(angle),iy1=CY+IR*Math.sin(angle);
    const ix2=CX+IR*Math.cos(angle+sweep),iy2=CY+IR*Math.sin(angle+sweep);
    const lg=sweep>Math.PI?1:0;
    const pct=((item.val/total)*100).toFixed(1);
    const tipHtml='<strong style="color:'+item.color+'">'+item.label+'</strong><br>'+fmt(item.val)+' ('+pct+'%)';
    tipDataD.push(tipHtml);
    paths+=`<path class="svgHitD" data-i="${tipDataD.length-1}" d="M${ix1},${iy1} L${x1},${y1} A${R},${R} 0 ${lg} 1 ${x2},${y2} L${ix2},${iy2} A${IR},${IR} 0 ${lg} 0 ${ix1},${iy1}" fill="${item.color}" stroke="#181C27" stroke-width="1.5" style="cursor:pointer;transition:opacity .15s"/>`;
    legendItems.push({color:item.color,label:item.label,pct});
    angle+=sweep;
  });
  let H,legendSvg='';
  if(desktop){
    // legend as 2-col grid below the donut
    H=CY+R+16+Math.ceil(legendItems.length/2)*20+8;
    legendItems.forEach((li,idx)=>{
      const col=idx%2, row=Math.floor(idx/2);
      const lx=col===0?10:W/2+10, ly=CY+R+22+row*20;
      legendSvg+=`<rect x="${lx}" y="${ly-9}" width="10" height="10" fill="${li.color}" rx="2"/>`;
      legendSvg+=`<text x="${lx+14}" y="${ly}" font-size="10" fill="#9BA3BF">${li.label.slice(0,14)} ${li.pct}%</text>`;
    });
  } else {
    H=180;
    legendItems.forEach((li,idx)=>{
      legends+=`<g transform="translate(205,${15+idx*22})"><rect width="10" height="10" fill="${li.color}" rx="2"/><text x="14" y="9" font-size="10" fill="#9BA3BF">${li.label.slice(0,14)} ${li.pct}%</text></g>`;
    });
  }
  el.innerHTML=`<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block">${paths}${legends}${legendSvg}</svg>`;
  if(desktop){
    el.querySelectorAll('.svgHitD').forEach(p=>{
      const i=+p.dataset.i;
      p.addEventListener('mousemove',e=>_tip(e,tipDataD[i]));
      p.addEventListener('mouseleave',_tipOff);
      p.addEventListener('mouseenter',()=>p.style.opacity='.75');
      p.addEventListener('mouseout',()=>p.style.opacity='1');
    });
  }
}

  el.innerHTML=`<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block">${legend}${gridLines}${yLabels}${bars}${hits}${xLabels}</svg>`;
  if(desktop){
    el.querySelectorAll('.svgHit2').forEach(r=>{
      const i=+r.dataset.i;
      r.addEventListener('mousemove',e=>_tip(e,tipData2[i]));
      r.addEventListener('mouseleave',_tipOff);
    });
  }
}

// ── AUTO-SAVE 30min ──
let _autoSaveTimer=null;
function startAutoSave(){
  if(_autoSaveTimer) clearInterval(_autoSaveTimer);
  _autoSaveTimer=setInterval(()=>{
    if(_mudou && gdToken){
      driveSalvar(true);
    }
  }, 30*60*1000);
}

// ── POPUP ATUALIZAR PAGAMENTOS ──
function getIgnorados(ano,mes){ return (S.ignorados||{})[ano+'_'+mes]||[]; }
function ignorarItem(ano,mes,id){
  if(!S.ignorados) S.ignorados={};
  const k=ano+'_'+mes;
  if(!S.ignorados[k]) S.ignorados[k]=[];
  if(!S.ignorados[k].includes(id)) S.ignorados[k].push(id);
  save();
}

function getPendentesDoMes(ano,mes){
  // Retorna itens que têm valor naquele mês, não foram pagos e não foram ignorados
  const d=S.dados[ano]; if(!d) return [];
  const ignorados=getIgnorados(ano,mes);
  const resultado=[];
  const hoje=new Date();
  const diaHoje=hoje.getDate();

  d.despesas.forEach(item=>{
    if(!(item.vals[mes]>0)) return;
    const k=chkKey(ano,mes,item.id);
    if((S.chk||{})[k]) return; // já pago
    if(ignorados.includes(item.id)) return; // ignorado
    const dia=item.dia||null;
    resultado.push({id:item.id,nome:item.nome,val:item.vals[mes],dia,tag:item.da?'D.A.':null,tipo:'d'});
  });

  d.pd.forEach(p=>{
    if(mes<p.ini||mes>=p.ini+p.n) return;
    const k=chkKey(ano,mes,p.id);
    if((S.chk||{})[k]) return;
    if(ignorados.includes(p.id)) return;
    resultado.push({id:p.id,nome:p.desc,val:p.valor,dia:p.dia||null,tag:'P',tipo:'d'});
  });

  return resultado.sort((a,b)=>(a.dia||99)-(b.dia||99));
}

function deveAbrirPopup(){
  const hoje=new Date();
  const ano=S.anoAtivo;
  const mes=hoje.getMonth();
  const dia=hoje.getDate();

  // verifica se já mostrou hoje
  const ultimaVez=S.config._popupVisto||'';
  const hoje_str=hoje.toISOString().slice(0,10);
  if(ultimaVez===hoje_str) return false;

  // verifica se tem pendentes do mês atual com dia <= hoje
  const pend=getPendentesDoMes(ano,mes).filter(p=>!p.dia||p.dia<=dia);
  // ou atrasados de meses anteriores
  const atrasados=[];
  for(let mi=0;mi<mes;mi++){
    const p=getPendentesDoMes(ano,mi);
    if(p.length) atrasados.push(...p.map(x=>({...x,mes:mi})));
  }
  return pend.length>0||atrasados.length>0;
}

function marcarPagoPopup(id,mes,btnEl){
  if(!S.chk) S.chk={};
  S.chk[chkKey(S.anoAtivo,mes,id)]=true;
  save();
  const row=btnEl.closest('.popup-row');
  if(row){
    row.style.opacity='.4';
    row.style.pointerEvents='none';
    btnEl.textContent='✓ Pago';
    btnEl.className='btn bxs bg';
  }
  renderAtrasados();
  if(tab==='home') renderChkSection();
}

function abrirPopupPagamentos(){
  const hoje=new Date();
  const ano=S.anoAtivo;
  const mes=hoje.getMonth();
  const dia=hoje.getDate();

  const pendMes=getPendentesDoMes(ano,mes).filter(p=>!p.dia||p.dia<=dia);
  const atrasadosMeses=[];
  for(let mi=0;mi<mes;mi++){
    const p=getPendentesDoMes(ano,mi);
    if(p.length) atrasadosMeses.push({mes:mi,itens:p});
  }

  if(pendMes.length===0&&atrasadosMeses.length===0){
    toast('✓ Tudo em dia!','green');
    return;
  }

  function rowHtml(item,mi){
    const tagHtml=item.tag?`<span class="tag ${item.tag==='P'?'tpa':item.tag==='D.A.'?'tda':'tpa'}" style="font-size:9px;padding:1px 4px">${item.tag}</span>`:'';
    const diaHtml=item.dia?`<span style="font-size:10px;font-weight:700;color:var(--text3);min-width:18px;text-align:right">${item.dia}</span>`:'<span style="min-width:18px"></span>';
    return`<div class="popup-row" style="display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:6px;background:var(--bg3);margin-bottom:5px">
      ${diaHtml}
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap">
          <span style="font-size:13px;font-weight:500">${item.nome}</span>
          ${tagHtml}
        </div>
        <div style="font-size:11px;font-weight:700;color:var(--red);margin-top:1px">${fmt(item.val)}</div>
      </div>
      <div style="display:flex;gap:4px;flex-shrink:0">
        <button class="btn bxs bg" onclick="marcarPagoPopup('${item.id}',${mi},this)">✓ Pago</button>
        <button class="btn bxs bgh" title="Ignorar este mês" onclick="ignorarItem(${ano},${mi},'${item.id}');this.closest('.popup-row').remove()">✕</button>
      </div>
    </div>`;
  }

  const pendHtml=pendMes.length>0
    ? pendMes.map(p=>rowHtml(p,mes)).join('')
    : `<div style="font-size:12px;color:var(--text3);padding:8px;font-style:italic">Nada pendente para hoje.</div>`;

  const atrasHtml=atrasadosMeses.length>0
    ? `<div style="margin-top:14px">
        <div class="sec-hdr" onclick="toggleSec('popup-ant')" style="cursor:pointer;margin-bottom:6px">
          <span style="font-size:11px;font-weight:600;color:var(--red)">⚠ Meses anteriores (${atrasadosMeses.reduce((s,x)=>s+x.itens.length,0)} pendentes)</span>
          <button class="sec-tog" data-tog="popup-ant" style="flex-shrink:0">+</button>
        </div>
        <div id="popup-ant" style="display:none">
          ${atrasadosMeses.map(({mes:mi,itens})=>`
            <div style="font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text3);margin:8px 0 4px;letter-spacing:.05em">${MONTHS[mi]}</div>
            ${itens.map(p=>rowHtml(p,mi)).join('')}
          `).join('')}
        </div>
      </div>`
    : '';

  // Marcar que mostrou hoje
  S.config._popupVisto=hoje.toISOString().slice(0,10);
  save();

  om(`<div class="modal" onclick="event.stopPropagation()" style="max-height:85vh;display:flex;flex-direction:column">
    <div class="mtitle" style="flex-shrink:0">
      📋 Atualizar Pagamentos — ${dia} de ${MONTHS[mes]}
      <button class="mclose" onclick="cm()">×</button>
    </div>
    <div style="font-size:12px;color:var(--text2);margin-bottom:12px;flex-shrink:0">
      Contas com vencimento até hoje que ainda não foram marcadas como pagas.
    </div>
    <div style="overflow-y:auto;flex:1;padding-right:4px">
      ${pendHtml}
      ${atrasHtml}
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px;flex-shrink:0;border-top:1px solid var(--border);padding-top:12px">
      <button class="btn bgh" onclick="cm()">Concluir</button>
    </div>
  </div>`);
}

function voltarSplash(){
  document.getElementById('app-root').style.display='none';
  document.getElementById('splash').style.display='flex';
}

let _complexidade='basico'; // 'basico' | 'avancado'

let _splashComplexidade='basico';

  setModo(m);
}

function setModo(m){

  document.body.classList.toggle('desktop',m==='desktop');

  document.getElementById('splash').style.display='none';
  document.getElementById('app-root').style.display='flex';

function atualizarBadgeComplexidade(){
  const bc=document.getElementById('complexidade-badge');

    bc.textContent=_complexidade==='basico'?'BÁSICO':'AVANÇADO';
    bc.className='modo-badge complexidade-badge '+_complexidade;
  }
}

function alternarComplexidade(){
  _complexidade=_complexidade==='basico'?'avancado':'basico';
  document.body.classList.toggle('modo-basico',_complexidade==='basico');
  atualizarBadgeComplexidade();
  // Se a aba atual não existe no novo modo, volta pra home
  const advIds=['ob','parc','res','free','graf','avi'];
  if(isBasico()&&advIds.includes(tab)) tab='home';
  renderAll();
  toast(_complexidade==='basico'?'Modo Básico ativado':'Modo Avançado ativado','green');
}

function isModo(m){return _modo===m;}
function isBasico(){return _complexidade==='basico';}

// ── INIT ──
function init(){
  try{
    setupY();renderNav();render();startAutoSave();
    const vb=document.getElementById('ver-badge');
    if(vb){const ver=S._saveVer||'—';const dt=S._saveDate||'—';vb.textContent=`v${ver} · ${dt}`;}
    // Popup de pagamentos é o PRIMEIRO a aparecer, com delay mínimo pra DOM estabilizar
    setTimeout(()=>{
      if(deveAbrirPopup()) abrirPopupPagamentos();
    }, 600);
  }catch(e){document.getElementById('MC').innerHTML='<div style="color:#F05252;padding:20px;font-size:13px">Erro ao iniciar: '+e.message+'</div>';}
}
